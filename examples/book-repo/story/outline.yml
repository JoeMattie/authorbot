  - id: scene:calibration-drift
    type: scene
    title: The fourth decimal place
    parent: chapter:baseline
    order: 31
    goal: Establish the drift as real, small, and periodic.
    conflict: Every plausible explanation implicates the instrument or its operator.
    outcome: Mara logs the drift and keeps it to herself.
  - id: chapter:null-results
