  - id: scene:the-notches
    type: scene
    title: Eleven notches
    parent: chapter:the-window
    order: 51
    goal: Resolve the arc into deliberate structure.
    conflict: Structure implies intent, which nobody wants to be first to say.
    outcome: The team stops calling it instrument error and names the window.
