    type: scene
    title: Killing the signal
    parent: chapter:null-results
    order: 41
    goal: Eliminate the instrument as the source of the drift.
    conflict: Each substitution costs beam time and proves nothing.
    outcome: The drift survives an isolated-power run; the instrument is exonerated.
