# Authorbot book configuration (schema: authorbot.book/v1).
# Replace the placeholder title/slug/id when you start a new book.
# Generate a fresh lowercase UUIDv7 for `id`; it never changes afterwards.
schema: authorbot.book/v1
id: 019f1ce8-1680-7ffe-a7ec-7161e44db476
title: Untitled Serial
slug: untitled-serial
language: en-US
license: CC-BY-NC-4.0
repository:
  default_branch: main
content:
  chapters_glob: chapters/*.md
  raw_html: false
planning:
  method: custom
  outline: story/outline.yml
  timeline: story/timeline.yml
  characters_glob: story/characters/*.md
publication:
  chapter_url: /chapters/{slug}/
  show_revision: true
  show_attribution: true
  show_public_annotations: true
# Secrets, GitHub App installation IDs, agent tokens, webhook secrets, and
# deployment credentials never belong in this file.
