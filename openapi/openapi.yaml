      required:
        - id
        - projectId
        - chapterId
        - targetKind
        - targetId
        - targetPath
        - proposalType
        - origin
        - workItemId
        - submissionId
        - authorActorId
        - baseRevision
        - baseContentHash
        - changeSummary
        - notes
        - status
        - reviewedByActorId
        - reviewedAt
        - reviewReason
        - gitOperationId
        - operationId
        - resultingRevision
        - commitSha
        - createdAt
        - updatedAt
        - target
        - currentRevision
        - currentContentHash
        - conflictWarning
        - author
        - reviewedBy
        - workItem
        - chapter
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        targetKind:
          $ref: "#/components/schemas/RevisionProposalTargetKind"
        targetId:
          type: string
          minLength: 1
        targetPath:
          type: string
          minLength: 1
