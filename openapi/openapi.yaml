          description: Retained actor id, GitHub actor ref, or commit identity.
        displayName:
          type: string
        type:
          oneOf:
            - type: string
              enum: [human, agent, system]
            - type: "null"

    ChapterHistoryRevision:
      type: object
      description: Commit metadata for one projected chapter revision.
      required:
        [revision, contentHash, commitSha, createdAt, author, changeSummary, origin, status, isCurrent]
      properties:
        revision:
          type: integer
          minimum: 1
        contentHash:
          description: Exact for the current projection; null in historical list rows.
          oneOf:
            - $ref: "#/components/schemas/ContentHash"
            - type: "null"
        commitSha:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        author:
          oneOf:
            - $ref: "#/components/schemas/ChapterHistoryActor"
            - type: "null"
        changeSummary:
          oneOf:
            - type: string
              maxLength: 2000
            - type: "null"
        origin:
          description: Proposal origin when retained, otherwise `repository_commit`.
          oneOf:
            - type: string
            - type: "null"
        status:
          description: Current publication state, or null until a historical snapshot is selected.
          oneOf:
            - $ref: "#/components/schemas/ChapterStatus"
            - type: "null"
        isCurrent:
          type: boolean

    ChapterHistoryCurrent:
      allOf:
        - $ref: "#/components/schemas/ChapterHistoryRevision"
        - type: object
          required: [status]
          properties:
            status:
              $ref: "#/components/schemas/ChapterStatus"

    ChapterHistorySnapshot:
      allOf:
        - $ref: "#/components/schemas/ChapterHistoryRevision"
        - type: object
          required: [content]
          properties:
            contentHash:
              $ref: "#/components/schemas/ContentHash"
            content:
              type: string
              description: Chapter prose with frontmatter and block markers removed.

    ChapterHistoryDiff:
      type: object
      required: [fromRevision, toRevision, unifiedDiff, computationLimited]
      properties:
        fromRevision:
          type: integer
          minimum: 1
        toRevision:
          type: integer
          minimum: 1
        unifiedDiff:
          oneOf:
            - type: string
            - type: "null"
        computationLimited:
          type: boolean

    ChapterHistoryPage:
      type: object
      additionalProperties: false
      required: [items, current, nextCursor]
      properties:
        items:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/ChapterHistoryRevision"
        current:
          $ref: "#/components/schemas/ChapterHistoryCurrent"
        nextCursor:
          $ref: "#/components/schemas/NextCursor"

    ChapterHistoryDetail:
