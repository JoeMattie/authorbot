  /v1/projects/{projectId}/work-items/{workItemId}/lease/recover:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    post:
      operationId: recoverWorkItemLeaseToken
      tags: [work]
      summary: Replace a lost in-memory token for a live lease.
      description: |
        Requires the exact authenticated session or agent-token credential
        that created the lease. The replacement token hash atomically replaces
        the old hash, so the old plaintext stops authorizing commands when the
        new plaintext is returned. Recovery does not renew, revive, or extend
        the lease. A claim issued before credential binding was recorded must
        be released and claimed again.

        The replacement plaintext appears only in the first successful
        response. An idempotent replay returns the same lease metadata with
        `tokenRedacted: true` and no `token`. Current `work:claim` authority
        and the exact claiming credential are rechecked before any replay is
        served.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [leaseId]
              properties:
                leaseId:
                  $ref: "#/components/schemas/Uuid"
      responses:
        "200":
          description: Lease token rotated without changing the lease lifetime.
          content:
            application/json:
              schema:
                type: object
                required: [workItemId, lease, correlationId]
                properties:
                  workItemId:
                    $ref: "#/components/schemas/Uuid"
                  lease:
                    type: object
                    required:
                      [id, expiresAt, maxExpiresAt, renewalCount, renewalPromptAt]
                    oneOf:
                      - required: [token]
                      - required: [tokenRedacted]
                    properties:
                      id:
                        $ref: "#/components/schemas/Uuid"
                      token:
                        type: string
                        description: Opaque replacement secret, returned once; only its hash is stored.
                      tokenRedacted:
                        type: boolean
                        const: true
                        description: Present and true instead of token on an idempotent replay.
                      expiresAt:
                        $ref: "#/components/schemas/Timestamp"
                      maxExpiresAt:
                        $ref: "#/components/schemas/Timestamp"
                      renewalCount:
                        type: integer
                        minimum: 0
                      renewalPromptAt:
                        $ref: "#/components/schemas/Timestamp"
                  correlationId:
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items/{workItemId}/lease/release:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    post:
      operationId: releaseWorkItemLease
      tags: [work]
      summary: Release the current lease and return the work item to ready.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      description: |
        Callable by the lease holder or by a maintainer, so no lease token is
        required; supply `leaseId` to assert which lease is being released.
        An expired-but-unswept lease is reported as expired rather than
        released, and the work item still returns to `ready`.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                leaseId:
                  allOf:
                    - $ref: "#/components/schemas/Uuid"
                  description: Optional guard; a mismatch with the active lease is a 409.
      responses:
        "200":
          description: Lease released (or found already expired).
          content:
            application/json:
              schema:
                type: object
                required: [workItemId, leaseId, status, expired, correlationId]
                properties:
                  workItemId:
                    $ref: "#/components/schemas/Uuid"
