  /v1/publications:
    post:
      operationId: reportPublication
      tags: [operations]
      summary: Signed CI callback reporting build and deployment state.
      description: |
        Authenticated by `X-Authorbot-Signature-256`, an HMAC-SHA256 with
        WEBHOOK_SECRET over `<delivery-id>.<timestamp>.<raw-body>` — not by
        session or bearer credentials. The delivery id and timestamp are part
        of the signed material precisely because the delivery id is the replay
        suppression key: signing the body alone would let anyone holding one
        captured request resubmit it indefinitely under fresh delivery ids.

        `X-Authorbot-Timestamp` must be within 5 minutes of server time, so a
        captured request expires independently of the delivery ledger.
        Deliveries are additionally deduplicated on `X-Authorbot-Delivery`; a
        repeat delivery is a no-op regardless of its content.

        Example (bash):

            BODY='{"integratedCommit":"...","buildStatus":"succeeded"}'
            DELIVERY=$(uuidgen)
            TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            SIG=$(printf '%s.%s.%s' "$DELIVERY" "$TS" "$BODY" \
              | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -r | cut -d' ' -f1)

        This is the ONLY writer of publication state. Design §17.3: a revision
        is never marked published merely because its Git commit succeeded.

        A single commit's publication advances through several callbacks
        (`queued` → `building` → `succeeded` → deployed). Fields omitted from a
        callback keep their stored value; an explicit `null` clears one.
      security: []
      parameters:
        - name: X-Authorbot-Delivery
          in: header
          required: true
          description: Unique delivery id; replays are suppressed.
          schema:
            type: string
            maxLength: 200
        - name: X-Authorbot-Timestamp
          in: header
          required: true
          description: >
            RFC 3339 instant the callback was signed at. Must be within 5
            minutes of server time and is covered by the signature.
          schema:
            type: string
            maxLength: 64
        - name: X-Authorbot-Signature-256
          in: header
          required: true
          description: >
            `sha256=<hex hmac>` over `<delivery-id>.<timestamp>.<raw-body>`
            with WEBHOOK_SECRET.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [integratedCommit, buildStatus]
              additionalProperties: false
              properties:
                projectSlug:
                  type: string
                  description: >
                    Optional guard. When present it must name this deployment's
                    project, so a callback aimed elsewhere is rejected rather
                    than silently applied here.
                integratedCommit:
                  type: string
                  pattern: "^[0-9a-f]{7,64}$"
                buildStatus:
                  type: string
                  enum: [queued, building, succeeded, failed]
                deployedCommit:
                  oneOf:
                    - type: string
                      pattern: "^[0-9a-f]{7,64}$"
                    - type: "null"
                publicUrl:
                  description: Absolute http(s) URL only.
                  oneOf:
                    - type: string
                      format: uri
                    - type: "null"
                deployedAt:
                  oneOf:
                    - $ref: "#/components/schemas/Timestamp"
                    - type: "null"
                publisherVersion:
                  oneOf:
                    - type: string
                    - type: "null"
      responses:
        "200":
          description: Applied to an existing publication row, or recognized as a duplicate delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationCallbackResult"
        "201":
          description: First report for this integrated commit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationCallbackResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Missing or invalid callback signature.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/webhooks/github:
    post:
      operationId: receiveGithubWebhook
      tags: [operations]
      summary: Receive GitHub webhook deliveries (signature-verified, deduplicated).
      description: |
        Authenticated by `X-Hub-Signature-256` HMAC, not by session or bearer
        credentials. Delivery IDs are deduplicated (design §14.5, §19.5).
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: false
          description: Event name; only `push` triggers a rebuild, others are recorded and ignored.
          schema:
            type: string
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema:
            type: string
        - name: X-Hub-Signature-256
          in: header
          required: true
          description: "`sha256=<hex hmac>` over the raw body with WEBHOOK_SECRET."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw GitHub webhook payload (opaque to this spec).
              additionalProperties: true
      responses:
        "200":
          description: Delivery processed (or recognized as a duplicate / ignored event).
          content:
            application/json:
              schema:
                type: object
                required: [duplicate]
                properties:
                  duplicate:
                    type: boolean
                  rebuilt:
                    type: boolean
                  event:
                    type: string
                    description: Present when the event was recorded but ignored.
                  counts:
                    type: object
                    description: Rebuild result (present after a rebuild).
                    properties:
                      chapters:
                        type: integer
                      annotations:
                        type: integer
                      replies:
                        type: integer
                      preservedPending:
                        type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Projection rebuild failed; the delivery is recorded as `failed`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    githubSession:
      type: apiKey
      in: cookie
      name: authorbot_session
      description: |
        Browser session established via GitHub OAuth login (design §19.1).
        HttpOnly, Secure, SameSite cookie; the value is an opaque session id.
    agentToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Named, scoped, revocable, expiring agent token (design §19.2). Only a
        hash is stored server-side. Humans and agents are treated identically
        after authorization.

  requestBodies:
    OverrideReason:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
                minLength: 1
                description: Required audit rationale recorded on the override decision.

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: The project UUID or its slug (single-project deployment).
      schema:
        oneOf:
          - $ref: "#/components/schemas/Uuid"
          - $ref: "#/components/schemas/Slug"
    ChapterId:
      name: chapterId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    AnnotationId:
      name: annotationId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque page cursor from a previous response's `nextCursor`.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Page size; values outside 1..200 are rejected (400).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-chosen key, unique per (project, actor, key), stored with a
        request hash. Replays return the original result; a replay with a
        different request hash returns 409.
      schema:
        type: string
        minLength: 1
        # Matches the implemented limit (apps/api idempotency middleware
        # MAX_KEY_LENGTH); longer keys are rejected with 400 validation-failed.
        maxLength: 200
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: |
        Entity tag of the revision the client last saw for the editable
        resource being changed. A mismatch returns 412.
      schema:
        type: string

  headers:
    ETag:
      description: Entity tag for the returned revision of an editable resource.
      schema:
        type: string
    XCorrelationId:
      description: Correlation id for tracing this request across the system.
      schema:
        $ref: "#/components/schemas/Uuid"

  responses:
    BadRequest:
      description: Invalid payload.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid credential.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Actor lacks scope or role.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found or intentionally hidden.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Lease, revision, idempotency, or semantic conflict.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    PreconditionFailed:
      description: Failed ETag or explicit precondition.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableEntity:
      description: Valid shape but a domain rule failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Uuid:
      type: string
      format: uuid
      description: UUIDv7, lowercase.
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      examples:
        - 0190f301-7045-7b2d-9d91-95b3c8228b54

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 UTC timestamp.
      examples:
        - 2026-07-19T18:00:00Z

    Slug:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
      description: Path-safe slug (no separators, no leading dots).

    ActorRef:
      type: string
      pattern: "^(github|agent|system):[A-Za-z0-9][A-Za-z0-9_-]*$"
      description: Actor reference, `<namespace>:<identifier>`.
      examples:
        - github:octocat
        - system:rule-engine

    StoryNodeId:
      type: string
      pattern: "^(premise|arc|part|chapter|scene|beat|event|character|location|concept|rule):[a-z0-9][a-z0-9-]*$"
      description: Story node / timeline / bible id, `<kind>:<slug>`.

    ContentHash:
      type: string
      pattern: "^sha256:[0-9a-f]{64}$"
      description: SHA-256 content hash with `sha256:` prefix.

    Scope:
      type: string
      description: |
        Token/membership scope (design §19.2/§19.3). `votes:write` is granted
        in Phase 3 as part of the contributor role bundle (and every role above
        it); agents vote only when their membership grants it (§11.2).
        `work:*`/`submissions:write` are granted now and used from Phase 4.
      enum:
        - chapters:read
        - annotations:read
        - annotations:write
        - votes:write
        - work:read
        - work:claim
        - submissions:write
        - tokens:manage
        - members:manage

    NextCursor:
      description: Cursor for the next page, or null on the last page.
      oneOf:
        - type: string
        - type: "null"

    Problem:
      type: object
      description: RFC 9457 problem details (`application/problem+json`).
      required: [title, status]
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          description: Stable machine-readable error code.
        correlationId:
          $ref: "#/components/schemas/Uuid"
      additionalProperties: true

    AcceptedCommand:
      type: object
      description: Envelope for commands queued for asynchronous Git integration.
      required: [operationId, correlationId, status]
      properties:
        operationId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
          description: This request's correlation id (client-supplied or generated).
        status:
          type: string
          enum: [queued]

    Actor:
      type: object
      required: [id, type, displayName, externalIdentity, status, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          type: string
          enum: [human, agent, system]
        displayName:
          type: string
        externalIdentity:
          description: "`<namespace>:<identifier>` (e.g. `github:octocat`, `agent:<actorId>`), or null for out-of-band rows."
          oneOf:
            - $ref: "#/components/schemas/ActorRef"
            - type: "null"
        status:
          type: string
          enum: [active, suspended, revoked]
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Membership:
      type: object
      required: [id, projectId, actorId, role, scopes, createdAt, revokedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        actorId:
          $ref: "#/components/schemas/Uuid"
        role:
          type: string
          enum: [reader, contributor, editor, maintainer]
        scopes:
          type: array
          description: The role's scope bundle at grant time.
          items:
            $ref: "#/components/schemas/Scope"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    PublicationCallbackResult:
      type: object
      required: [duplicate, applied]
      properties:
        duplicate:
          type: boolean
          description: The delivery id had already been seen; nothing was applied.
        applied:
          type: boolean
        publicationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        publication:
          oneOf:
            - $ref: "#/components/schemas/Publication"
            - type: "null"

    Publication:
      type: object
      description: >
        One integrated commit's publication state as reported by CI
        (design §17.3). Never inferred from a successful Git commit.
      required: [id, integratedCommit, buildStatus, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        integratedCommit:
          type: string
          description: Repository commit CI built from.
        buildStatus:
          type: string
          enum: [queued, building, succeeded, failed]
        deployedCommit:
          description: Commit actually serving the public site, per CI.
          oneOf:
            - type: string
            - type: "null"
        publicUrl:
          oneOf:
            - type: string
              format: uri
            - type: "null"
        deployedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        publisherVersion:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    PublicationStatus:
      type: object
      description: >
        Integrated versus deployed (design §17.3): `integratedCommit` is what
        Authorbot projected, `deployedCommit` is what CI says is live. They are
        reported separately so the gap is visible rather than assumed.
      required: [integratedCommit, deployedCommit, buildStatus, inSync]
      properties:
        integratedCommit:
          oneOf:
            - type: string
            - type: "null"
        deployedCommit:
          oneOf:
            - type: string
            - type: "null"
        buildStatus:
          description: Build status of the most recent publication CI reported.
          oneOf:
            - type: string
              enum: [queued, building, succeeded, failed]
            - type: "null"
        publicUrl:
          oneOf:
            - type: string
              format: uri
            - type: "null"
        deployedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        publisherVersion:
          oneOf:
            - type: string
            - type: "null"
        inSync:
          type: boolean
          description: >
            True only when both commits are known AND equal. An unknown
            deployment is never reported as up to date.
        latest:
          oneOf:
            - $ref: "#/components/schemas/Publication"
            - type: "null"

    Project:
      type: object
      required: [id, slug, repoProvider, repo, defaultBranch, status, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        slug:
          $ref: "#/components/schemas/Slug"
        repoProvider:
          type: string
          enum: [github]
        repo:
          type: string
          description: "`owner/name`, e.g. `JoeMattie/causal-projector`."
        defaultBranch:
          type: string
        status:
          type: string
          enum: [active, invalid, diverged, archived]
        gitIntegration:
          type: string
          enum: [configured, unconfigured, incomplete, invalid]
          description: >
            Whether this deployment holds a usable GitHub App credential set
            (Phase 5 §2). `unconfigured` means reads work and mutations are
            accepted and queued, but nothing is committed to the repository;
            `incomplete` means some but not all of GITHUB_APP_ID,
            GITHUB_APP_PRIVATE_KEY and GITHUB_INSTALLATION_ID are set;
            `invalid` means all three are present but at least one cannot work
            (a PKCS#1 private key, a non-numeric app or installation id).
            `incomplete` and `invalid` are both treated exactly like
            `unconfigured` at runtime. `configured` means all three are present
            and well-formed. No credential value is ever exposed.
        projection:
          type: object
          description: >
            State of the database projection relative to the repository
            (Phase 5 §6, design §20.3).
          required: [commit, stale]
          properties:
            commit:
              description: >
                Repository commit the projection was last built from — the
                *integrated* commit. Null before the first successful refresh.
              oneOf:
                - type: string
                - type: "null"
            stale:
              type: boolean
              description: >
                A verified push has arrived that the projection has not yet
                absorbed. Set before the refresh is attempted, so a refresh
                that never ran is still visible as owed work.
        divergence:
          type: object
          description: >
            Design §14.5 divergence state. While `diverged`, prose writes are
            refused with the `project-diverged` problem and reads continue.
          required: [state]
          properties:
            state:
              type: string
              enum: [ok, diverged]
            divergedAt:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            kinds:
              type: array
              items:
                type: string
                enum: [revision-regressed, anchor-blocks-vanished]
            chapters:
              type: array
              items:
                type: object
                properties:
                  chapterId:
                    $ref: "#/components/schemas/Uuid"
                  path:
                    type: string
                  kind:
                    type: string
                  projectedRevision:
                    type: integer
                  snapshotRevision:
                    type: integer
        publication:
          $ref: "#/components/schemas/PublicationStatus"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    AgentToken:
      type: object
      description: Agent token metadata; the secret itself is never returned after minting.
      required: [id, projectId, actorId, name, scopes, createdBy, createdAt, expiresAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        actorId:
          description: The agent actor created for this token.
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/Scope"
        createdBy:
          description: Actor id of the minting maintainer.
          $ref: "#/components/schemas/Uuid"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        expiresAt:
          $ref: "#/components/schemas/Timestamp"
        lastUsedAt:
          description: Updated at most once per minute.
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    ChapterStatus:
      type: string
      enum: [draft, proposed, published, archived]

    Chapter:
      type: object
      description: Chapter projection (design §9.1), rebuilt from the book repository.
      required:
        [id, projectId, path, slug, title, status, revision, contentHash, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        path:
          type: string
          description: Repo-relative path, e.g. `chapters/001-baseline.md`.
        slug:
          $ref: "#/components/schemas/Slug"
        title:
          type: string
        status:
          $ref: "#/components/schemas/ChapterStatus"
        revision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        headCommit:
          description: Git commit SHA of the current integrated revision, when known.
          oneOf:
            - type: string
            - type: "null"
        lastPublishedCommit:
          oneOf:
            - type: string
            - type: "null"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
        blockIds:
          type: array
          description: Valid block ids of this revision (persisted on the chapter projection).
          items:
            $ref: "#/components/schemas/Uuid"

    AnnotationKind:
      type: string
      enum: [comment, suggestion]

    AnnotationScope:
      type: string
      enum: [range, block, chapter]

    AnnotationStatus:
      type: string
      description: |
        `pending_git` is API/DB-only: the command is accepted but its Git
        operation has not committed yet. Artifact frontmatter never carries it.
      enum:
        - pending_git
        - open
        - work_item_created
        - accepted
        - resolved
        - rejected
        - withdrawn
        - superseded
        - orphaned
        - needs_reanchor

    TextPosition:
      type: object
      description: Offsets in the normalized plain-text stream of the block.
      required: [start, end]
      properties:
        start:
          type: integer
          minimum: 0
        end:
          type: integer
          minimum: 0

    TextQuote:
      type: object
      required: [exact]
      properties:
        exact:
          type: string
        prefix:
          type: string
          description: Roughly 32 normalized characters before the selection.
        suffix:
          type: string
          description: Roughly 32 normalized characters after the selection.

    AnnotationTarget:
      type: object
      description: Independent selectors for range/block targets (design §10.1).
      required: [blockId]
      properties:
        blockId:
          $ref: "#/components/schemas/Uuid"
        textPosition:
          $ref: "#/components/schemas/TextPosition"
        textQuote:
          $ref: "#/components/schemas/TextQuote"

    VoteSummary:
      type: object
      description: Current vote aggregate for an annotation.
      properties:
        approvals:
          type: integer
        rejections:
          type: integer
        abstentions:
          type: integer
        netScore:
          type: number
        distinctVoters:
          type: integer
        humanApprovals:
          type: integer
        agentApprovals:
          type: integer

    Annotation:
      type: object
      required:
        [
          id,
          projectId,
          chapterId,
          kind,
          scope,
          chapterRevision,
          target,
          authorActorId,
          body,
          status,
          gitOperationId,
          supersededBy,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        chapterId:
          $ref: "#/components/schemas/Uuid"
        kind:
          $ref: "#/components/schemas/AnnotationKind"
        scope:
          $ref: "#/components/schemas/AnnotationScope"
        chapterRevision:
          type: integer
          minimum: 1
        target:
          description: Null for chapter-scoped annotations.
          oneOf:
            - $ref: "#/components/schemas/AnnotationTarget"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        body:
          type: string
          description: Markdown body. Untrusted content.
        status:
          $ref: "#/components/schemas/AnnotationStatus"
        gitOperationId:
          description: The most recent Git operation mirroring this record.
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        supersededBy:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    Reply:
      type: object
      required:
        [id, projectId, annotationId, parentReplyId, authorActorId, body, status, gitOperationId, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        annotationId:
          $ref: "#/components/schemas/Uuid"
        parentReplyId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        body:
          type: string
        status:
          type: string
          # Mirrors the replies.status DB CHECK constraint; `withdrawn` is not
          # produced by any implemented endpoint yet but is a legal state.
          enum: [pending_git, open, withdrawn]
        gitOperationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    VoteValue:
      type: string
      enum: [approve, reject, abstain]

    Vote:
      type: object
      description: One current vote per actor per annotation (design §9.1).
      required: [annotationId, actor, value, createdAt]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        actor:
          $ref: "#/components/schemas/ActorRef"
        value:
          $ref: "#/components/schemas/VoteValue"
        weight:
          type: number
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    Decision:
      type: object
      description: Sticky record of a rule threshold crossing (design §11.3).
      required: [id, sourceAnnotationId, rule, ruleVersion, result]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        sourceAnnotationId:
          $ref: "#/components/schemas/Uuid"
        rule:
          type: string
        ruleVersion:
          type: integer
        metrics:
          type: object
          additionalProperties:
            type: number
        result:
          type: string
          enum: [create_work_item, rejected, support_changed, overridden]
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        effectiveAt:
          $ref: "#/components/schemas/Timestamp"
        overrideReason:
          type: string

    DecisionSummary:
      type: object
      description: |
        Decision projection embedded in vote and work-item responses (Phase 3
        contract §4). Aggregate metrics only — never per-voter data (§26.1).
      required:
        [id, sourceAnnotationId, actionType, rule, ruleVersion, metrics, result, supportChanged, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        sourceAnnotationId:
          $ref: "#/components/schemas/Uuid"
        actionType:
          type: string
          enum: [create_work_item, reject_suggestion, reopen_suggestion, cancel_work_item]
        rule:
          type: string
        ruleVersion:
          type: integer
          minimum: 0
          description: 0 marks a maintainer override; >= 1 is a rule crossing.
        metrics:
          type: object
          additionalProperties:
            type: number
        result:
          type: string
          enum: [create_work_item, rejected, support_changed, overridden]
        supportChanged:
          type: boolean
        overrideReason:
          oneOf:
            - type: string
            - type: "null"
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    VoteResult:
      type: object
      description: Response to casting or clearing a vote (Phase 3 contract §2–§4).
      required: [annotationId, value, votes, ruleSatisfied, decision]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        value:
          description: The caller's new current vote, or null after a clear.
          oneOf:
            - $ref: "#/components/schemas/VoteValue"
            - type: "null"
        votes:
          $ref: "#/components/schemas/VoteSummary"
        ruleSatisfied:
          type: boolean
          description: Whether the rule is currently satisfied for this suggestion.
        decision:
          description: The sticky decision, if one exists for this suggestion.
          oneOf:
            - $ref: "#/components/schemas/DecisionSummary"
            - type: "null"

    AnnotationOverrideResult:
      type: object
      description: Response to a maintainer suggestion override (Phase 3 contract §4).
      required: [annotationId, status, decisionId, operationIds, correlationId]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        status:
          $ref: "#/components/schemas/AnnotationStatus"
        decisionId:
          $ref: "#/components/schemas/Uuid"
        operationIds:
          type: array
          items:
            $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string

    WorkItemType:
      type: string
      enum:
        - revise_range
        - revise_block
        - revise_chapter
        - write_chapter
        - resolve_conflict
        - planning

    WorkItemStatus:
      type: string
      enum:
        - ready
        - leased
        - submitted
        - applying
        - completed
        - conflict
        - failed
        - cancelled

    WorkItem:
      type: object
      required: [id, type, status, priority, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          $ref: "#/components/schemas/WorkItemType"
        status:
          $ref: "#/components/schemas/WorkItemStatus"
        sourceAnnotationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        baseRevision:
          type: integer
          minimum: 1
        priority:
          type: string
          enum: [low, normal, high]
        acceptanceCriteria:
          type: array
          items:
            type: string
        currentLeaseId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdBy:
          $ref: "#/components/schemas/ActorRef"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Lease:
      type: object
      description: Server-enforced capability; the token appears only in claim responses.
      required: [id, workItemId, holder, issuedAt, expiresAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        workItemId:
          $ref: "#/components/schemas/Uuid"
        holder:
          $ref: "#/components/schemas/ActorRef"
        issuedAt:
          $ref: "#/components/schemas/Timestamp"
        expiresAt:
          $ref: "#/components/schemas/Timestamp"
        renewalCount:
          type: integer
          minimum: 0
        maxExpiresAt:
          $ref: "#/components/schemas/Timestamp"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    SubmissionType:
      type: string
      enum: [range_replacement, block_replacement, chapter_replacement]

    SubmissionState:
      type: string
      enum: [received, validating, applying, applied, rejected, conflict]

    Submission:
      type: object
      required: [id, actor, type, state, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        actor:
          $ref: "#/components/schemas/ActorRef"
        type:
          $ref: "#/components/schemas/SubmissionType"
        baseRevision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        validationResult:
          type: object
          properties:
            valid:
              type: boolean
            findings:
              type: array
              items:
                type: object
                required: [code, severity, message]
                properties:
                  code:
                    type: string
                  severity:
                    type: string
                    enum: [error, warning]
                  path:
                    type: string
                  message:
                    type: string
                  pointer:
                    type: string
        integrationCommit:
          oneOf:
            - type: string
            - type: "null"
        state:
          $ref: "#/components/schemas/SubmissionState"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Operation:
      type: object
      description: Asynchronous Git operation (design §9.1 GitOperation, §20.2 states).
      required:
        [id, projectId, correlationId, state, attempts, commitSha, error, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
          description: Correlation id of the accepted command (client-supplied or generated).
        state:
          type: string
          enum:
            - queued
            - preparing
            - committing
            - committed
            - verified
            - conflict
            - failed
        attempts:
          type: integer
          minimum: 0
        commitSha:
          oneOf:
            - type: string
            - type: "null"
        error:
          description: Terminal or most recent failure message, when any.
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    TaskBundle:
      type: object
      description: Claim response with full working context (design §15.3). All prose fields are untrusted input; bundles never contain deployment secrets or hidden instructions.
      required: [workItem, lease, document, context, submissionSchema]
      properties:
        workItem:
          allOf:
            - $ref: "#/components/schemas/WorkItem"
          description: The claimed work item, including acceptance criteria.
        lease:
          allOf:
            - $ref: "#/components/schemas/Lease"
            - type: object
              required: [token, renewalPromptAt]
              properties:
                token:
                  type: string
                  description: Opaque lease secret, returned once; only its hash is stored.
                renewalPromptAt:
                  $ref: "#/components/schemas/Timestamp"
                  description: When a client should offer renewal — expiresAt minus the configured lead time.
        document:
          type: object
          required: [chapterId, revision, contentHash, source]
          properties:
            chapterId:
              $ref: "#/components/schemas/Uuid"
            revision:
              type: integer
              minimum: 1
            contentHash:
              $ref: "#/components/schemas/ContentHash"
            source:
              type: string
              description: Full chapter Markdown at the base revision.
        target:
          type: object
          description: Present for range/block work; resolved against the base revision.
          properties:
            blockId:
              $ref: "#/components/schemas/Uuid"
            exact:
              type: string
            start:
              type: integer
              minimum: 0
            end:
              type: integer
              minimum: 0
        context:
          type: object
          description: Untrusted project data assembled for the claimant.
          properties:
            annotationBody:
              type: string
            chapterSummary:
              type: string
            storyRefs:
              type: array
              items:
                $ref: "#/components/schemas/StoryNodeId"
        submissionSchema:
          oneOf:
            - type: string
            - type: "null"
          description: >-
            Schema id the submission payload must satisfy, or `null` for work
            item types that are claimable but have no submission flow yet
            (`write_chapter`, `planning` — Phase 4 contract §1). Those types
            return 201 with this field present and null, so generated clients
            must treat it as nullable.
          examples:
            - authorbot.submission/range-replacement/v1

    StoryGraph:
      type: object
      description: Structural projection of `story/outline.yml` (authorbot.story-graph/v1).
      required: [schema, nodes]
      properties:
        schema:
          type: string
          const: authorbot.story-graph/v1
        nodes:
          type: array
          items:
            type: object
            required: [id, type]
            properties:
              id:
                $ref: "#/components/schemas/StoryNodeId"
              type:
                type: string
                enum: [premise, arc, part, chapter, scene, beat, custom]
              title:
                type: string
              parent:
                $ref: "#/components/schemas/StoryNodeId"
              order:
                type: number
              chapterId:
                $ref: "#/components/schemas/Uuid"
        links:
          type: array
          items:
            type: object
            required: [from, to, kind]
            properties:
              from:
                $ref: "#/components/schemas/StoryNodeId"
              to:
                $ref: "#/components/schemas/StoryNodeId"
              kind:
                type: string

    Timeline:
      type: object
      description: Structural projection of `story/timeline.yml` (authorbot.timeline/v1).
      required: [schema, events]
      properties:
        schema:
          type: string
          const: authorbot.timeline/v1
        events:
          type: array
          items:
            type: object
            required: [id, sortKey, displayTime, title]
            properties:
              id:
                $ref: "#/components/schemas/StoryNodeId"
              sortKey:
                type: number
              displayTime:
                type: string
              title:
                type: string
              participants:
                type: array
                items:
                  $ref: "#/components/schemas/StoryNodeId"
              locations:
                type: array
                items:
                  $ref: "#/components/schemas/StoryNodeId"
              chapterRefs:
                type: array
                items:
                  $ref: "#/components/schemas/Uuid"
              facts:
                type: array
                items:
                  type: string

    Character:
      type: object
      description: Character record projection (authorbot.character/v1).
      required: [id, name]
      properties:
        id:
          $ref: "#/components/schemas/StoryNodeId"
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        summary:
          type: string
        status:
          type: string
        body:
          type: string
          description: Markdown body of the character file. Untrusted content.

    Event:
      type: object
      description: SSE payload shape (design §15.5). Notification only; refetch authoritative resources.
      required: [id, type, occurredAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          type: string
          enum:
            - annotation.created
            - annotation.vote_changed
            - work_item.created
            - lease.changed
            - operation.completed
            - publication.completed
        projectId:
          $ref: "#/components/schemas/Uuid"
        occurredAt:
          $ref: "#/components/schemas/Timestamp"
        data:
          type: object
          description: Event-specific reference payload (ids, not full resources).
          additionalProperties: true
