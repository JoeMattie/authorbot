openapi: 3.1.0

info:
  title: Authorbot API
  version: 1.0.0-alpha.0
  summary: Coordination-plane API for Authorbot book projects.
  description: |
    Skeleton of the Authorbot v1 API per design §15.

    Conventions (design §15.1):
    - All paths are prefixed with `/v1`.
    - Entity identifiers are UUIDv7, lowercase.
    - Timestamps are UTC RFC 3339 (`2026-07-19T18:00:00Z`).
    - Mutation endpoints require an `Idempotency-Key` header.
    - Editable resources return `ETag` and honor `If-Match`.
    - Errors are `application/problem+json` (RFC 9457).
    - List endpoints use cursor pagination (`cursor`, `limit`, `nextCursor`).
    - Every response carries `X-Correlation-Id`; asynchronous commands return
      an operation id resolvable at `/v1/projects/{projectId}/operations/{operationId}`.
    - Humans (GitHub-backed session cookie) and agents (bearer token) are
      treated identically after authorization.

    Implementation status: operations marked `x-implementation-status: planned`
    are design skeleton for later phases and are not served yet. Everything
    else matches the Phase 2 implementation (`apps/api`). Operations marked
    `x-dev-only: true` exist only when the deployment runs `AUTH_MODE=dev`;
    operations marked `x-auth-mode: github` only under `AUTH_MODE=github`.
  license:
    name: UNLICENSED
    identifier: LicenseRef-Authorbot-Internal

servers:
  - url: /
    description: Same-origin deployment; paths already include the /v1 prefix.

security:
  - githubSession: []
  - agentToken: []

tags:
  - name: identity
    description: Identity and project metadata (design §15.2, identity block).
  - name: chapters
    description: Chapters and story documents.
  - name: annotations
    description: Annotations, replies, votes, and re-anchoring.
  - name: work
    description: Work items, leases, and submissions (design §12).
  - name: operations
    description: Git operations, event stream, and webhooks.

paths:
  /v1/me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Return the authenticated actor, memberships, and effective scopes.
      responses:
        "200":
          description: The current actor.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: object
                required: [actor, memberships, scopes, authKind]
                properties:
                  actor:
                    $ref: "#/components/schemas/Actor"
                  memberships:
                    type: array
                    items:
                      $ref: "#/components/schemas/Membership"
                  scopes:
                    type: array
                    description: Effective scopes (role bundle for sessions, token ∩ bundle for agents).
                    items:
                      $ref: "#/components/schemas/Scope"
                  authKind:
                    type: string
                    enum: [session, token]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/dev/login:
    post:
      operationId: devLogin
      tags: [identity]
      summary: Create or load a dev actor + membership and issue a session cookie.
      description: |
        Mounted ONLY when the deployment runs `AUTH_MODE=dev`; the route does
        not exist under `AUTH_MODE=github`. Creates/loads the actor
        (`github:<login>`), replaces its membership with the requested role,
        and sets the `authorbot_session` cookie.
      x-dev-only: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, role]
              properties:
                login:
                  type: string
                  pattern: "^[A-Za-z0-9][A-Za-z0-9-]{0,38}$"
                role:
                  type: string
                  enum: [reader, contributor, editor, maintainer]
      responses:
        "200":
          description: Session issued; `Set-Cookie` carries the signed session.
          headers:
            Set-Cookie:
              description: "`authorbot_session=<id>.<hmac>; HttpOnly; Secure; SameSite=Lax`"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [actor, membership, scopes]
                properties:
                  actor:
                    $ref: "#/components/schemas/Actor"
                  membership:
                    $ref: "#/components/schemas/Membership"
                  scopes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Scope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/github:
    get:
      operationId: startGithubLogin
      tags: [identity]
      summary: Begin the GitHub OAuth web flow (github mode only).
      x-auth-mode: github
      security: []
      responses:
        "302":
          description: Redirect to GitHub's authorize URL; sets a signed state cookie.

  /v1/auth/github/callback:
    get:
      operationId: finishGithubLogin
      tags: [identity]
      summary: Complete the GitHub OAuth web flow and issue a session (github mode only).
      x-auth-mode: github
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Session issued via `Set-Cookie`; redirects to `/`.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      tags: [identity]
      summary: Return project metadata.
      responses:
        "200":
          description: The project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectMembers
      tags: [identity]
      summary: List project members.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of memberships.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Membership"
                        - type: object
                          required: [actor]
                          properties:
                            actor:
                              description: The member's actor, or null when the row is dangling.
                              oneOf:
                                - $ref: "#/components/schemas/Actor"
                                - type: "null"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/agent-tokens:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createAgentToken
      tags: [identity]
      summary: Mint a named, scoped, expiring agent token (returned once).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, scopes]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                scopes:
                  type: array
                  minItems: 1
                  description: Requested scopes; effective scopes are capped by the agent's pinned `editor` membership bundle.
                  items:
                    $ref: "#/components/schemas/Scope"
                expiresInDays:
                  type: integer
                  minimum: 1
                  maximum: 90
                  default: 30
      responses:
        "201":
          description: Token created; the secret appears exactly once, here.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AgentToken"
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: >-
                          Opaque bearer secret (`authorbot_<43 chars base64url>`);
                          only its SHA-256 hash is stored. Idempotent replays
                          return `tokenRedacted: true` instead.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/agent-tokens/{tokenId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: tokenId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    delete:
      operationId: revokeAgentToken
      tags: [identity]
      summary: Revoke an agent token.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Token revoked (no body).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listChapters
      tags: [chapters]
      summary: List chapter projections.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of chapters.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Chapter"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/chapters/{chapterId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: getChapter
      tags: [chapters]
      summary: Return one chapter projection.
      responses:
        "200":
          description: The chapter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/chapter-submissions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createChapterSubmission
      x-implementation-status: planned
      tags: [chapters]
      summary: Submit a full chapter draft or revision outside the work-item flow.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                type:
                  type: string
                  enum: [full_document]
                chapterId:
                  $ref: "#/components/schemas/Uuid"
                slug:
                  $ref: "#/components/schemas/Slug"
                title:
                  type: string
                baseRevision:
                  type: integer
                  minimum: 1
                baseContentHash:
                  $ref: "#/components/schemas/ContentHash"
                content:
                  type: string
                  description: Full chapter Markdown, including frontmatter and block markers.
                summary:
                  type: string
      responses:
        "202":
          description: Accepted and queued for Git integration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedCommand"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/story/outline:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getStoryOutline
      x-implementation-status: planned
      tags: [chapters]
      summary: Return the story graph (authorbot.story-graph/v1 projection).
      responses:
        "200":
          description: The story graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryGraph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/story/timeline:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getStoryTimeline
      x-implementation-status: planned
      tags: [chapters]
      summary: Return the timeline (authorbot.timeline/v1 projection).
      responses:
        "200":
          description: The timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timeline"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/story/characters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listStoryCharacters
      x-implementation-status: planned
      tags: [chapters]
      summary: List character records.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of characters.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Character"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/chapters/{chapterId}/annotations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: listAnnotations
      tags: [annotations]
      summary: List annotations on a chapter.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of annotations.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Annotation"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createAnnotation
      tags: [annotations]
      summary: Create a comment or suggestion on a chapter (queued for Git mirroring).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [kind, scope, chapterRevision, body]
              description: |
                `target` is required for `range` scope (blockId + textPosition +
                textQuote) and `block` scope (blockId only), and forbidden for
                `chapter` scope. `chapterRevision` must equal the projected
                revision (else 409). Body is Markdown ≤ 32 KiB passing the
                Phase 0 safety rules (no raw HTML, allowed URL schemes only).
              properties:
                kind:
                  $ref: "#/components/schemas/AnnotationKind"
                scope:
                  $ref: "#/components/schemas/AnnotationScope"
                chapterRevision:
                  type: integer
                  minimum: 1
                target:
                  $ref: "#/components/schemas/AnnotationTarget"
                body:
                  type: string
                  description: Markdown body. Untrusted content; sanitized on render.
      responses:
        "202":
          description: Accepted; the record is `pending_git` until its operation commits.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [annotationId]
                    properties:
                      annotationId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/annotations/{annotationId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    get:
      operationId: getAnnotation
      tags: [annotations]
      summary: Return one annotation with its collaboration state.
      description: >
        The single-annotation read complement of `listAnnotations`, returning
        the same `Annotation` shape (including the caller's own vote, when
        authenticated). Follows the same anonymous-read gate as the chapter
        annotations list: readable without a session only when the project
        publishes annotations publicly.
      responses:
        "200":
          description: The annotation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/annotations/{annotationId}/replies:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    get:
      operationId: listAnnotationReplies
      tags: [annotations]
      summary: List an annotation's replies (threaded via parentReplyId).
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of replies.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reply"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createAnnotationReply
      tags: [annotations]
      summary: Reply to an annotation (queued for Git mirroring).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [body]
              properties:
                body:
                  type: string
                  description: Markdown body ≤ 32 KiB, same safety rules as annotations.
                parentReplyId:
                  $ref: "#/components/schemas/Uuid"
      responses:
        "202":
          description: Accepted; the reply is `pending_git` until its operation commits.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [replyId]
                    properties:
                      replyId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/annotations/{annotationId}/vote:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    put:
      operationId: putAnnotationVote
      tags: [annotations]
      summary: Create or replace the caller's current vote (one per actor).
      description: |
        Requires `votes:write` (the contributor role bundle and above; agents
        vote only when their membership grants it). Votes are accepted on
        suggestions only — a comment returns 422. Recording the vote runs the
        declarative rule engine in the same serialized command: a threshold
        crossing creates a sticky decision and a `ready` work item, both
        surfaced in `decision`. Tallies are aggregate-only; per-voter identity
        is never returned (design §26.1).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  $ref: "#/components/schemas/VoteValue"
      responses:
        "200":
          description: Vote recorded; returns the refreshed aggregate and any decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteAnnotationVote
      tags: [annotations]
      summary: Clear the caller's current vote.
      description: |
        Removes the caller's current vote (idempotent — clearing a non-existent
        vote still returns 200) and re-evaluates the rule. Dropping below a
        satisfied rule marks the existing decision `support_changed`; the
        decision and its work item are never deleted (design §11.3).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Vote cleared; returns the refreshed aggregate and any decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/annotations/{annotationId}/reject:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: rejectSuggestion
      tags: [annotations]
      summary: Maintainer override — reject an open suggestion.
      description: |
        Maintainer-only. Transitions an `open` suggestion to `rejected` and
        records a sticky override decision (`rule_version: 0`) carrying the
        required `reason` as `override_reason`. Audited. A non-open suggestion
        returns 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/OverrideReason"
      responses:
        "200":
          description: Suggestion rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnotationOverrideResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/annotations/{annotationId}/reopen:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: reopenSuggestion
      tags: [annotations]
      summary: Maintainer override — reopen a rejected suggestion.
      description: |
        Maintainer-only. Transitions a `rejected` suggestion back to `open` and
        records an override decision (`rule_version: 0`) with the required
        `reason`. Audited.
      parameters:
