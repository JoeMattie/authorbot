  /v1/projects/{projectId}/operations/{operationId}/retry:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: operationId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    post:
      operationId: retryOperation
      tags: [operations]
      summary: Requeue a Git operation that ran out of retries.
      description: >-
        Maintainer only. Moves a `failed` operation back to `queued` and its
        outbox row back to `pending`, so the coordinator attempts it again.
        Availability failures (GitHub 5xx, rate limits) no longer consume the
        retry budget - they are deferred to a later drain automatically - so
        reaching `failed` means a bounded number of genuine attempts were made.
        This re-runs the existing plan rather than rewriting it: an operation
        that failed because its content is invalid will fail again.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Requeued; poll the operation for the outcome.
          content:
            application/json:
              schema:
                type: object
                required: [operationId, state, correlationId]
                properties:
                  operationId:
                    $ref: "#/components/schemas/Uuid"
                  state:
                    type: string
                    enum: [queued]
                  correlationId:
                    $ref: "#/components/schemas/Uuid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The operation is not in a state that can be requeued.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/projects/{projectId}/events:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: streamProjectEvents
      tags: [operations]
      summary: Server-Sent Events feed of project activity (design §15.5).
      # Authentication is optional only for the public `poll=1` representation;
      # the implementation still refuses anonymous SSE and non-public books.
      security:
        - githubSession: []
        - agentToken: []
        - {}
      description: |
        Emits `text/event-stream` frames from a monotonic, cursor-ordered
        `events` table. Event types (Phase 3 contract §5): `annotation_created`,
        `vote_aggregate`, `decision_created`, `decision_support_changed`,
        `work_item_created`, `operation_completed`. A 15s heartbeat comment
        keeps the connection warm. Events are notifications only; clients MUST
        refetch authoritative resources after reconnecting. Resume without loss
        via `Last-Event-ID` (or the `after` query parameter).

        Authenticated project members may use the full stream. Anonymous
        readers and signed-in non-members admitted by an open or
        approval-gated annotation policy may use only the `poll=1`
        representation. It is filtered to explicitly reviewed public
        collaboration subtypes: conflict Work creation and Work cancellation
        remain private even though they reuse Phase 3 event names.
        `operation_completed` is limited to unambiguously public annotation
        and reply outbox kinds; chapter, submission, decision, Work, and
        settings operations remain private. Each allowed public row is also
        projected to explicitly reviewed payload fields, so additive internal
        fields remain private. Public SSE is refused so later operational event
        types can never cross the public boundary before an explicit review.
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
        - name: after
          in: query
          required: false
          description: Resume cursor (event id); alternative to `Last-Event-ID`.
          schema:
            type: integer
            minimum: 0
        - name: poll
          in: query
          required: false
          description: |
            When `1`, returns a JSON page of events after the cursor instead of
            an SSE stream - the simple-agent fallback (§26.1).
          schema:
            type: integer
            enum: [1]
      responses:
        "200":
          description: |
            An open SSE stream, or - with `poll=1` - a JSON page of events.

            A stream is bounded on both axes: the server closes it after five
            minutes (reconnect with `Last-Event-ID`; no events are missed), and
            one client address may hold only a small number of streams at once.
            Exceeding the concurrency cap returns `429` with `Retry-After`.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Stream of `event:`/`id:`/`data:` frames; `data` is a JSON
                  object matching #/components/schemas/Event.
            application/json:
              schema:
                type: object
                required: [items, latestId]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  latestId:
                    type: integer
                    description: Highest event id in this page (the next cursor).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/divergence/clear:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: clearProjectDivergence
      tags: [operations]
      summary: Clear a diverged project and (by default) resynchronize from the repository.
      description: |
        Maintainer-only recovery path for design §14.5 divergence. Clearing the
        flag alone would leave the projection and the repository still
        disagreeing, so by default this also re-projects the repository as
        truth and re-anchors annotations against it (Phase 4 §5 rules); pass
        `resync: false` to only reopen prose writes. Always audited with the
        supplied reason.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              additionalProperties: false
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 2000
                  description: Why the maintainer is clearing divergence. Stored and audited.
                resync:
                  type: boolean
                  default: true
      responses:
        "200":
          description: Divergence cleared.
          content:
            application/json:
              schema:
                type: object
                required: [cleared]
                properties:
                  cleared:
                    type: boolean
                  clearedFindings:
                    type: array
                    items:
                      type: object
                  resync:
                    description: Present when `resync` was not disabled.
                    oneOf:
                      - type: object
                      - type: "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The project is not diverged.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/projects/{projectId}/settings:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getBookSettings
      tags: [identity]
      summary: Read the book's editable settings and effective governance rules.
      description: |
        Maintainer-only (Phase 6 contract §3.6). Returns the projection of the
        book's `book.yml`, split into three blocks that mirror the contract's
        field classes:

        - `settings` - freely editable values. This is what a settings form
          binds to.
        - `guarded` - `slug` and `publication.chapter_url`, each shipped with
          the consequence of changing it, so the UI does not carry its own copy
          of the warning.
        - `readOnly` - fields the API will never change, each with the reason.
          Present so the interface can explain the boundary, never as form
          fields.

        `governance.source` is `book` once the book declares its own rules in
        `book.yml`, and `bootstrap` while it is still running the deployment's
        `RULES_JSON` (or the built-in default). `governance.vocabulary` is the
        closed set of metrics and operators a rule condition may name.

        `status` is `pending_git` while a previous settings commit is still in
        flight, so the view can say "saving…" honestly.
      responses:
        "200":
          description: The book's settings.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: object
                required: [settings, guarded, governance, readOnly, status]
                properties:
                  settings:
                    type: object
                    properties:
                      title: { type: string }
                      language: { type: string }
                      license:
                        oneOf: [{ type: string }, { type: "null" }]
                      publication:
                        type: object
                        properties:
                          show_revision:
                            oneOf: [{ type: boolean }, { type: "null" }]
                          show_attribution:
                            oneOf: [{ type: boolean }, { type: "null" }]
                          show_public_annotations:
                            oneOf: [{ type: boolean }, { type: "null" }]
                  guarded:
                    type: object
                    description: >
                      Each entry carries the current `value` and the
                      `consequence` of changing it.
                    additionalProperties:
                      type: object
                      properties:
                        value:
                          oneOf: [{ type: string }, { type: "null" }]
                        consequence: { type: string }
                  governance:
                    type: object
                    required: [source, rules, vocabulary]
                    properties:
                      source:
                        type: string
                        enum: [book, bootstrap]
                      rules:
                        type: object
                        additionalProperties:
                          $ref: "#/components/schemas/GovernanceRule"
                      vocabulary:
                        type: object
                        properties:
                          metrics:
                            type: array
                            items: { type: string }
                          operators:
                            type: array
                            items: { type: string }
                  readOnly:
                    type: object
                    description: >
                      Never-editable values plus a `reasons` map explaining each.
                      Not form fields.
                  status:
                    type: string
                    enum: [pending_git, committed]
                  updatedAt: { type: string, format: date-time }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            The book's `book.yml` has not been projected from its repository
            yet, so there is nothing to read.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
    patch:
      operationId: updateBookSettings
      tags: [identity]
      summary: Change the book's settings; the change lands as a commit to book.yml.
      description: |
        Maintainer-only (Phase 6 contract §3.6). This is a read-modify-write of
        `book.yml` that lands through the same outbox, coordinator, validation,
        and attribution path as any other write - settings changes are commits:
        diffable, revertable, audited. There is no second configuration store.

        Only the fields present in the body change. An explicit `null` clears an
        optional field; omitting it leaves the field alone.

        **`governance.rules` replaces the rule map wholesale** rather than
        merging it, so a rule can be removed - including the default
        `human_maintainer_approvals >= 1` clause, which §3.6 makes removable
        for authors running a genuinely collaborative project.

        **Rule versions are assigned by the server and may not be supplied.**
        Phase 3 keys decisions on
        `(source_annotation_id, action_type, rule_version)`, so an edited rule
        that kept its version would make two materially different rules
        indistinguishable in the decision record. Each rule whose
        `when`/`action`/`trigger` differs from the currently effective rule of
        the same name gets `previous version + 1`; unchanged rules keep theirs.

        Guarded fields (`slug`, `publication.chapter_url`) are refused with
        `settings-confirmation-required` unless the request names them in
        `confirm`; the refusal states what breaks. Never-editable fields
        (`id`, `repository.default_branch`, `content.*`,
        `publication.api_url`, `schema`) are refused with
        `settings-field-immutable` and a per-field reason.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                title: { type: string, minLength: 1 }
                language: { type: string }
                license:
                  oneOf: [{ type: string, minLength: 1 }, { type: "null" }]
                slug: { type: string }
                publication:
                  type: object
                  additionalProperties: false
                  properties:
                    chapter_url:
                      oneOf: [{ type: string, minLength: 1 }, { type: "null" }]
                    show_revision:
                      oneOf: [{ type: boolean }, { type: "null" }]
                    show_attribution:
                      oneOf: [{ type: boolean }, { type: "null" }]
                    show_public_annotations:
                      oneOf: [{ type: boolean }, { type: "null" }]
                governance:
                  type: object
                  additionalProperties: false
                  required: [rules]
                  properties:
                    rules:
                      type: object
                      description: >
                        Replaces the whole rule map. Rule objects must NOT
                        carry `version` - the server assigns it.
                      additionalProperties:
                        $ref: "#/components/schemas/GovernanceRuleInput"
                confirm:
                  type: array
                  description: Dotted paths of guarded fields the maintainer has confirmed.
                  items: { type: string }
      responses:
        "200":
          description: >
            The patch changed nothing, so no commit was queued. `git log` stays
            free of empty settings commits when a form is re-saved unmodified.
          content:
            application/json:
              schema:
                type: object
                required: [status, changed, settings]
                properties:
                  status: { type: string, enum: [unchanged] }
                  changed:
                    type: array
                    items: { type: string }
                  settings: { type: object }
        "202":
          description: The change was accepted and a commit to book.yml was queued.
          content:
            application/json:
              schema:
                type: object
                required: [operationId, status, changed, settings]
                properties:
                  operationId: { type: string, format: uuid }
                  status: { type: string, enum: [queued] }
                  changed:
                    type: array
                    description: Dotted paths that actually differ.
                    items: { type: string }
                  settings: { type: object }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >
            A guarded change was not confirmed
            (`settings-confirmation-required`), or a previous settings commit
            is still in flight.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "422":
          description: >
            A never-editable field was present (`settings-field-immutable`).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  /v1/projects/{projectId}/publications:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listPublications
      tags: [operations]
      summary: List reported publications, newest first.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        "200":
          description: Publication history.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Publication"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/publications:
    post:
      operationId: reportPublication
      tags: [operations]
      summary: Signed CI callback reporting build and deployment state.
      description: |
        Authenticated by `X-Authorbot-Signature-256`, an HMAC-SHA256 with
        WEBHOOK_SECRET over `<delivery-id>.<timestamp>.<raw-body>` - not by
        session or bearer credentials. The delivery id and timestamp are part
        of the signed material precisely because the delivery id is the replay
        suppression key: signing the body alone would let anyone holding one
        captured request resubmit it indefinitely under fresh delivery ids.

        `X-Authorbot-Timestamp` must be within 5 minutes of server time, so a
        captured request expires independently of the delivery ledger.
        Deliveries are additionally deduplicated on `X-Authorbot-Delivery`; a
        repeat delivery is a no-op regardless of its content.

        Example (bash):

            BODY='{"integratedCommit":"...","buildStatus":"succeeded"}'
            DELIVERY=$(uuidgen)
            TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            SIG=$(printf '%s.%s.%s' "$DELIVERY" "$TS" "$BODY" \
              | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -r | cut -d' ' -f1)

        This is the ONLY writer of publication state. Design §17.3: a revision
        is never marked published merely because its Git commit succeeded.

        A single commit's publication advances through several callbacks
        (`queued` → `building` → `succeeded` → deployed). Fields omitted from a
        callback keep their stored value; an explicit `null` clears one.
      security: []
      parameters:
        - name: X-Authorbot-Delivery
          in: header
          required: true
          description: Unique delivery id; replays are suppressed.
          schema:
            type: string
            maxLength: 200
        - name: X-Authorbot-Timestamp
          in: header
          required: true
          description: >
            RFC 3339 instant the callback was signed at. Must be within 5
            minutes of server time and is covered by the signature.
          schema:
            type: string
            maxLength: 64
        - name: X-Authorbot-Signature-256
          in: header
          required: true
          description: >
            `sha256=<hex hmac>` over `<delivery-id>.<timestamp>.<raw-body>`
            with WEBHOOK_SECRET.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [integratedCommit, buildStatus]
              additionalProperties: false
              properties:
                projectSlug:
                  type: string
                  description: >
                    Optional guard. When present it must name this deployment's
                    project, so a callback aimed elsewhere is rejected rather
                    than silently applied here.
                integratedCommit:
                  type: string
                  pattern: "^[0-9a-f]{7,64}$"
                buildStatus:
                  type: string
                  enum: [queued, building, succeeded, failed]
                deployedCommit:
                  oneOf:
                    - type: string
                      pattern: "^[0-9a-f]{7,64}$"
                    - type: "null"
                publicUrl:
                  description: Absolute http(s) URL only.
                  oneOf:
                    - type: string
                      format: uri
                    - type: "null"
                deployedAt:
                  oneOf:
                    - $ref: "#/components/schemas/Timestamp"
                    - type: "null"
                publisherVersion:
                  oneOf:
                    - type: string
                    - type: "null"
      responses:
        "200":
          description: Applied to an existing publication row, or recognized as a duplicate delivery.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationCallbackResult"
        "201":
          description: First report for this integrated commit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicationCallbackResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Missing or invalid callback signature.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/webhooks/github:
    post:
      operationId: receiveGithubWebhook
      tags: [operations]
      summary: Receive GitHub webhook deliveries (signature-verified, deduplicated).
      description: |
        Authenticated by `X-Hub-Signature-256` HMAC, not by session or bearer
        credentials. Delivery IDs are deduplicated (design §14.5, §19.5).
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: false
          description: Event name; only `push` triggers a rebuild, others are recorded and ignored.
          schema:
            type: string
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema:
            type: string
        - name: X-Hub-Signature-256
          in: header
          required: true
          description: "`sha256=<hex hmac>` over the raw body with WEBHOOK_SECRET."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw GitHub webhook payload (opaque to this spec).
              additionalProperties: true
      responses:
        "200":
          description: Delivery processed (or recognized as a duplicate / ignored event).
          content:
            application/json:
              schema:
                type: object
                required: [duplicate]
                properties:
                  duplicate:
                    type: boolean
                  rebuilt:
                    type: boolean
                  event:
                    type: string
                    description: Present when the event was recorded but ignored.
                  counts:
                    type: object
                    description: Rebuild result (present after a rebuild).
                    properties:
                      chapters:
                        type: integer
                      annotations:
                        type: integer
                      replies:
                        type: integer
                      preservedPending:
                        type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Projection rebuild failed; the delivery is recorded as `failed`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  # =========================================================================
  # Phase 7 - author-facing access control
  #
  # Every operation below is maintainer-only except `getRateLimits` and
  # `getAccessState`, which any member may read: a collaborator who receives a
  # 423 needs to be able to see that the book is locked rather than concluding
  # the API is broken.
  # =========================================================================

  /v1/projects/{projectId}/access:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getAccessState
      tags: [access]
      summary: The book's annotation policy, freeze state, and agent-pause state.
      description: >-
        Readable by any member. `annotationPolicy` is projected from
        `book.yml`; the freeze and agent pause are operational state that takes
        effect on the next request rather than on the next commit.
      responses:
        "200":
          description: Current access state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/access/freeze:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: freezeBook
      tags: [access]
      summary: Freeze the book - no writes from anyone, including maintainers.
      description: >-
        The emergency stop. Refuses every collaboration write (annotations,
        replies, votes, claims, submissions, moderation approvals) with `423`
        while leaving all reads and the published site unaffected. A reason is
        required: it is shown to everyone the freeze blocks. Re-freezing an
        already frozen book is a no-op that preserves the original reason.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Freeze applied (or already in effect).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/access/unfreeze:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: unfreezeBook
      tags: [access]
      summary: Lift a freeze.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Freeze lifted (or was never in effect).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/access/pause-agents:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: pauseAgents
      tags: [access]
      summary: Suspend every agent token at once; human collaborators keep working.
      description: >-
        Reversible: no token is revoked, and resuming restores every token's
        identity, scopes, expiry, and history. While paused, any request
        authenticated by an agent token that would write is refused with `403`
        - including the control plane, so a paused agent cannot unpause itself.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Agents paused (or already paused).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessState"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/access/resume-agents:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: resumeAgents
      tags: [access]
      summary: Resume paused agent tokens.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Agents resumed (or were never paused).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessState"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/rate-limits:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getRateLimits
      tags: [access]
      summary: The documented mutation ceilings.
      description: >-
        Served so an agent author can read the ceilings they are writing
        against rather than discovering them through 429s. Limits apply to
        mutations only; reads are never counted and never refused by a limit.
      responses:
        "200":
          description: Ceiling table, per limit class.
          content:
            application/json:
              schema:
                type: object
                properties:
                  classes:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        perActor: { type: integer }
                        perToken: { type: integer }
                        windowSeconds: { type: integer }
                        description: { type: string }
                  notes:
                    type: array
                    items: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/collaborators:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listCollaborators
      tags: [access]
      summary: Who has access, their role, when they joined, who added them, and when they last acted.
      parameters:
        - name: includeRemoved
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Collaborators, with plain-language role consequences.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Collaborator"
                  roleConsequences:
                    type: object
                    description: What each role means, in plain language rather than scope names.
                    additionalProperties: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/collaborators/{actorId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: actorId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    patch:
      operationId: changeCollaboratorRole
      tags: [access]
      summary: Change a collaborator's role.
      description: >-
        The book's last maintainer cannot be demoted - a book with no
        maintainer has no one who can mint a token, change a setting, or lift a
        freeze. This is also the route that grants an author's agent the
        `maintainer` role so it keeps working under a `locked` policy: a
        deliberate grant, never an inheritance from the agent's owner.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [role]
              properties:
                role:
                  $ref: "#/components/schemas/Role"
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Role changed (or already held).
          content:
            application/json:
              schema:
                type: object
                properties:
                  actorId: { $ref: "#/components/schemas/Uuid" }
                  role: { $ref: "#/components/schemas/Role" }
                  previousRole: { $ref: "#/components/schemas/Role" }
                  roleMeans: { type: string }
                  changed: { type: boolean }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: removeCollaborator
      tags: [access]
      summary: Remove a collaborator, effective on their next request.
      description: >-
        Revokes the membership, invalidates every session the actor holds,
        releases any lease they hold (returning the work item to `ready`),
        rejects their in-flight submissions, and revokes the agent tokens they
        own. Their prior contributions - annotations, replies, votes, commit
        attribution - are left entirely intact. Nothing here deletes content.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Collaborator removed; the cascade is reported.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevocationOutcome"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/agent-tokens/revoke-all:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: revokeAllAgentTokens
      tags: [access]
      summary: Revoke every agent token in one action, for a suspected leak.
      description: >-
        One statement revokes them all, so there is no window in which the
        leaked token is the one not yet reached. Each token's holder gets the
        full revocation cascade: leases released, in-flight submissions
        rejected, queued applies failed.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [reason]
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: All tokens revoked; the cascade is reported.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevocationOutcome"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/audit:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: readAuditLog
      tags: [access]
      summary: The readable activity view, newest first, filterable by actor.
      parameters:
        - name: actor
          in: query
          required: false
          description: Actor id or external identity (`github:avery`).
          schema: { type: string }
        - name: action
          in: query
          required: false
          schema: { type: string }
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Audit events, newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEntry"
                  nextCursor:
                    type: [string, "null"]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/moderation/queue:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listModerationQueue
      tags: [access]
      summary: Annotations awaiting review under an `approval-gated` policy.
      description: >-
        Queued annotations live only in the operational database - never in
        Git - until approved. Each entry carries the comment, its target
        passage, and the author's history with this book.
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, all]
            default: pending
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: The queue.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PendingAnnotation"
                  nextCursor:
                    type: [string, "null"]
                  pendingCount: { type: integer }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/moderation/{pendingId}/approve:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: pendingId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    post:
      operationId: approvePendingAnnotation
      tags: [access]
      summary: Approve a queued annotation, mirroring it to Git as a normal annotation.
      description: >-
        Approval is what makes a comment durable. The queued row is inserted
        into `annotations` carrying its own id forward and an ordinary
        `annotation.create` commit is enqueued, credited to the SUBMITTER
        rather than the approving maintainer. Refused with `423` while the book
        is frozen, because approval commits new content.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Approved; the commit is queued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pendingId: { $ref: "#/components/schemas/Uuid" }
                  annotationId: { $ref: "#/components/schemas/Uuid" }
                  operationId: { $ref: "#/components/schemas/Uuid" }
                  status: { type: string, enum: [queued] }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/moderation/{pendingId}/reject:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: pendingId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    post:
      operationId: rejectPendingAnnotation
      tags: [access]
      summary: Reject a queued annotation; the record is retained, never committed.
      description: >-
        Takes an optional reason, notifies nobody, and keeps the row in the
        database so a mistake is recoverable and a pattern of abuse is visible.
        Because the annotation never entered `annotations`, there is nothing in
        the repository for a rejection to leave a trace in.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Rejected and retained.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pendingId: { $ref: "#/components/schemas/Uuid" }
                  status: { type: string, enum: [rejected] }
                  retained: { type: boolean }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/moderation/bulk:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: bulkModerate
      tags: [access]
      summary: Bulk approve or bulk reject queued annotations.
      description: >-
        Per-item outcomes rather than all-or-nothing: in a queue of two
        hundred, one row already reviewed by a co-maintainer must not fail the
        other hundred and ninety-nine.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [action, ids]
              properties:
                action: { type: string, enum: [approve, reject] }
                ids:
                  type: array
                  minItems: 1
                  maxItems: 200
                  items: { $ref: "#/components/schemas/Uuid" }
                reason: { type: string, minLength: 1, maxLength: 2000 }
      responses:
        "200":
          description: Per-item outcomes plus a summary.
          content:
            application/json:
              schema:
                type: object
                properties:
                  action: { type: string, enum: [approve, reject] }
                  approved: { type: integer }
                  rejected: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        pendingId: { $ref: "#/components/schemas/Uuid" }
                        outcome: { type: string }
                        annotationId: { $ref: "#/components/schemas/Uuid" }
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"


components:
  securitySchemes:
    githubSession:
      type: apiKey
      in: cookie
      name: authorbot_session
      description: |
        Browser session established via GitHub OAuth login (design §19.1).
        HttpOnly, Secure, SameSite cookie; the value is an opaque session id.
    agentToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Named, scoped, revocable, expiring agent token (design §19.2). Only a
        hash is stored server-side. Humans and agents are treated identically
        after authorization.

  requestBodies:
    PromotionBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              reason:
                type: string
                minLength: 3
                maxLength: 2000
                description: Optional legacy rationale retained on the decision.
    OverrideReason:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [reason]
            properties:
              reason:
                type: string
                minLength: 1
                description: Required audit rationale recorded on the override decision.

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: The project UUID or its slug (single-project deployment).
      schema:
        oneOf:
          - $ref: "#/components/schemas/Uuid"
          - $ref: "#/components/schemas/Slug"
    ChapterId:
      name: chapterId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    ProposalId:
      name: proposalId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    AnnotationId:
      name: annotationId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque page cursor from a previous response's `nextCursor`.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Page size; values outside 1..200 are rejected (400).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-chosen key, unique per (project, actor, key), stored with a
        request hash. Replays return the original result; a replay with a
        different request hash returns 409.
      schema:
        type: string
        minLength: 1
        # Matches the implemented limit (apps/api idempotency middleware
        # MAX_KEY_LENGTH); longer keys are rejected with 400 validation-failed.
        maxLength: 200
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: |
        Entity tag of the revision the client last saw for the editable
        resource being changed. A mismatch returns 412.
      schema:
        type: string

  headers:
    ETag:
      description: Entity tag for the returned revision of an editable resource.
      schema:
        type: string
    XCorrelationId:
      description: Correlation id for tracing this request across the system.
      schema:
        $ref: "#/components/schemas/Uuid"

  responses:
    BadRequest:
      description: Invalid payload.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid credential.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Actor lacks scope or role.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found or intentionally hidden.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Lease, revision, idempotency, or semantic conflict.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    PreconditionFailed:
      description: Failed ETag or explicit precondition.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableEntity:
      description: Valid shape but a domain rule failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    # ---- Phase 6 §3.6 governance --------------------------------------------
    RuleCondition:
      type: object
      additionalProperties: false
      required: [metric, operator, value]
      properties:
        metric:
          type: string
          description: >
            Must name a metric in the closed vocabulary returned by
            `GET .../settings` as `governance.vocabulary.metrics`. A condition
            naming anything else makes the whole rule unsatisfied (fail closed),
            so the API refuses it at write time.
          pattern: "^[a-z][a-z0-9_]*$"
        operator:
          type: string
          enum: [gte, gt, lte, lt, eq]
        value:
          type: number
    RuleWhen:
      type: object
      description: A condition group - exactly one of `all` or `any`.
      minProperties: 1
      maxProperties: 1
      properties:
        all:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/RuleCondition" }
        any:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/RuleCondition" }
    RuleAction:
      type: object
      additionalProperties: false
      required: [type, work_type]
      properties:
        type:
          type: string
          enum: [create_work_item]
        work_type:
          $ref: "#/components/schemas/WorkItemType"
    GovernanceRule:
      type: object
      description: >
        A declarative governance rule as stored in `book.yml`
        (`governance.rules`). Rules are data: no expression or code from
        configuration is ever evaluated.
      additionalProperties: false
      required: [version, when, action]
      properties:
        version:
          type: integer
          minimum: 1
          description: >
            Server-assigned. Recorded on every decision the rule produces, and
            part of the decision uniqueness key, so it must change whenever the
            rule's meaning does.
        trigger:
          type: string
          enum: [vote_changed]
        when: { $ref: "#/components/schemas/RuleWhen" }
        action: { $ref: "#/components/schemas/RuleAction" }
    GovernanceRuleInput:
      type: object
      description: >
        A rule as supplied to `PATCH .../settings`. Identical to
        `GovernanceRule` except that `version` is absent: the server assigns it,
        and a client-supplied version is rejected rather than silently ignored.
      additionalProperties: false
      required: [when, action]
      properties:
        trigger:
          type: string
          enum: [vote_changed]
        when: { $ref: "#/components/schemas/RuleWhen" }
        action: { $ref: "#/components/schemas/RuleAction" }
    Uuid:
      type: string
      format: uuid
      description: UUIDv7, lowercase.
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      examples:
        - 0190f301-7045-7b2d-9d91-95b3c8228b54

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 UTC timestamp.
      examples:
        - 2026-07-19T18:00:00Z

    Slug:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
      description: Path-safe slug (no separators, no leading dots).

    ActorRef:
      type: string
      pattern: "^(github|agent|system):[A-Za-z0-9][A-Za-z0-9_-]*$"
      description: Actor reference, `<namespace>:<identifier>`.
      examples:
        - github:octocat
        - system:rule-engine

    StoryNodeId:
      type: string
      pattern: "^(premise|arc|part|chapter|scene|beat|event|character|location|concept|rule):[a-z0-9][a-z0-9-]*$"
      description: Story node / timeline / bible id, `<kind>:<slug>`.

    ContentHash:
      type: string
      pattern: "^sha256:[0-9a-f]{64}$"
      description: SHA-256 content hash with `sha256:` prefix.

    Scope:
      type: string
      description: |
        Token/membership scope (design §19.2/§19.3). `votes:write` is granted
        in Phase 3 as part of the contributor role bundle (and every role above
        it); agents vote only when their membership grants it (§11.2).
        `work:*`/`submissions:write` are granted now and used from Phase 4.
      enum:
        - chapters:read
        - annotations:read
        - annotations:write
        - votes:write
        - work:read
        - work:claim
        - submissions:write
        - tokens:manage
        - members:manage

    EditorialCapability:
      type: string
      description: Exact Phase 11 editorial authority; unknown names never inherit access.
      enum:
        - chapters:read
        - comments:read
        - suggestions:read
        - comments:write
        - suggestions:write
        - replies:write
        - comments:vote
        - suggestions:vote
        - feedback:withdraw-own
        - feedback:moderate
        - work:read
        - work:promote
        - work:claim
        - work:submit
        - work:cancel
        - summaries:write
        - chapters:write
        - chapters:publish
        - revisions:read
        - revisions:write
        - revisions:review
        - history:read

    EditorialCapabilitySet:
      type: array
      uniqueItems: true
      items:
        $ref: "#/components/schemas/EditorialCapability"

    CapabilityMode:
      type: string
      description: Human role projection, translated legacy token, or canonical token grant.
      enum: [human, legacy, canonical]

    LegacyEffectiveAction:
      type: object
      additionalProperties: false
      required: [action, source, sourceScope]
      properties:
        action:
          type: string
          enum: [feedback:moderate, work:promote, work:cancel]
        source:
          type: string
          const: legacy-scope
        sourceScope:
          type: string
          enum: [annotations:write, work:claim]

    NextCursor:
      description: Cursor for the next page, or null on the last page.
      oneOf:
        - type: string
        - type: "null"

    Problem:
      type: object
      description: RFC 9457 problem details (`application/problem+json`).
      required: [title, status]
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          description: Stable machine-readable error code.
        correlationId:
          $ref: "#/components/schemas/Uuid"
      additionalProperties: true

    AcceptedChapterWrite:
      type: object
      description: >-
        A queued chapter write. The chapter id is reserved and returned
        immediately; the slug, order, marker ids and committed bytes are
        composed against the branch head when the outbox drains.
      required: [chapterId, operationId, correlationId, status]
      properties:
        chapterId:
          $ref: "#/components/schemas/Uuid"
        operationId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
        status:
          type: string
          enum: [queued]

    NewChapterSubmission:
      type: object
      description: Create a chapter. The server generates everything not listed here.
      required: [title, body]
      properties:
        title:
          type: string
          minLength: 1
        body:
          type: string
          description: >-
            Chapter prose as plain Markdown: no frontmatter, no block markers.
            The server inserts a marker for every top-level block.
        slug:
          $ref: "#/components/schemas/Slug"
        summary:
          type: string

    ChapterRevisionSubmission:
      type: object
      description: >-
        Revise an existing chapter. `baseRevision` must equal the chapter's
        current revision; a stale one is rejected with 409, and marker ids are
        preserved for blocks whose text did not change.
      required: [chapterId, baseRevision]
      properties:
        chapterId:
          $ref: "#/components/schemas/Uuid"
        baseRevision:
          type: integer
          minimum: 1
        title:
          type: string
          minLength: 1
        body:
          type: string
        summary:
          type: string

    AcceptedCommand:
      type: object
      description: Envelope for commands queued for asynchronous Git integration.
      required: [operationId, correlationId, status]
      properties:
        operationId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
          description: This request's correlation id (client-supplied or generated).
        status:
          type: string
          enum: [queued]

    Actor:
      type: object
      required: [id, type, displayName, externalIdentity, status, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          type: string
          enum: [human, agent, system]
        displayName:
          type: string
        externalIdentity:
          description: "`<namespace>:<identifier>` (e.g. `github:octocat`, `agent:<actorId>`), or null for out-of-band rows."
          oneOf:
            - $ref: "#/components/schemas/ActorRef"
            - type: "null"
        status:
          type: string
          enum: [active, suspended, revoked]
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Role:
      type: string
      description: A membership role. Bundles are cumulative.
      enum: [reader, contributor, editor, maintainer]

    AnnotationPolicy:
      type: string
      description: >-
        Who may comment and suggest, and whether it appears immediately.
        `open` - any signed-in user, immediately. `approval-gated` - any
        signed-in user, after a maintainer approves. `collaborators-only` -
        members only, immediately (the default). `locked` - maintainers only,
        immediately. Anonymous writing is unavailable in every mode, `open`
        included.
      enum: [open, approval-gated, collaborators-only, locked]

    AccessState:
      type: object
      required: [annotationPolicy, requiresApproval, freeze, agents]
      properties:
        annotationPolicy:
          $ref: "#/components/schemas/AnnotationPolicy"
        requiresApproval:
          type: boolean
        freeze:
          type: object
          properties:
            state: { type: string, enum: [open, frozen] }
            since:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            reason: { type: [string, "null"] }
        agents:
          type: object
          properties:
            state: { type: string, enum: [active, paused] }
            since:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            reason: { type: [string, "null"] }
        pendingModerationCount:
          type: integer
        changed:
          type: boolean
          description: Present on writes; false when the control was already in the requested state.

    Collaborator:
      type: object
      required: [membershipId, actorId, role, joinedAt]
      properties:
        membershipId: { $ref: "#/components/schemas/Uuid" }
        actorId: { $ref: "#/components/schemas/Uuid" }
        actor: { $ref: "#/components/schemas/Actor" }
        role: { $ref: "#/components/schemas/Role" }
        roleMeans:
          type: string
          description: The role's consequences in plain language, not scope names.
        scopes:
          type: array
          items: { $ref: "#/components/schemas/Scope" }
        joinedAt: { $ref: "#/components/schemas/Timestamp" }
        removedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        addedByActorId:
          description: >-
            From the audit log. `null` for a membership created before Phase 7
            recorded member events - the honest answer rather than a guess.
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        lastActedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        isAgent: { type: boolean }
        ownerActorId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"

    RevocationOutcome:
      type: object
      description: >-
        What a revocation actually did. `contributionsRetained` is always true
        and is stated explicitly: removing someone is not erasing them, and the
        interface must not imply otherwise.
      properties:
        actorId: { $ref: "#/components/schemas/Uuid" }
        removed: { type: boolean }
        sessionsInvalidated: { type: boolean }
        leasesReleased:
          type: array
          items:
            type: object
            properties:
              leaseId: { $ref: "#/components/schemas/Uuid" }
              workItemId: { $ref: "#/components/schemas/Uuid" }
        submissionsRejected:
          type: array
          items: { $ref: "#/components/schemas/Uuid" }
        agentTokensRevoked:
          type: array
          items: { $ref: "#/components/schemas/Uuid" }
        revoked:
          type: array
          description: "Present on revoke-all: the tokens that were revoked."
          items:
            type: object
            properties:
              id: { $ref: "#/components/schemas/Uuid" }
              name: { type: string }
        contributionsRetained: { type: boolean, enum: [true] }

    AuditEntry:
      type: object
      required: [id, at, action, targetType]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        at: { $ref: "#/components/schemas/Timestamp" }
        action: { type: string }
        actorId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        actorName: { type: [string, "null"] }
        actorIdentity: { type: [string, "null"] }
        actorType: { type: [string, "null"] }
        targetType: { type: string }
        targetId: { type: [string, "null"] }
        correlationId: { type: string }
        metadata:
          description: Safe structured metadata only; never credential material.

    PendingAnnotation:
      type: object
      description: >-
        An annotation awaiting review. Shaped like `Annotation` where the
        fields coincide, with `moderation` naming the difference - this is the
        "badged as awaiting review" of the contract. It has no
        `gitOperationId` because it has never been, and while pending will
        never be, mirrored to Git.
      required: [id, projectId, chapterId, kind, scope, body, moderation]
      properties:
        id: { $ref: "#/components/schemas/Uuid" }
        projectId: { $ref: "#/components/schemas/Uuid" }
        chapterId: { $ref: "#/components/schemas/Uuid" }
        kind: { $ref: "#/components/schemas/AnnotationKind" }
        scope: { $ref: "#/components/schemas/AnnotationScope" }
        chapterRevision: { type: integer }
        target:
          oneOf:
            - $ref: "#/components/schemas/AnnotationTarget"
            - type: "null"
        authorActorId: { $ref: "#/components/schemas/Uuid" }
        body: { type: string }
        moderation:
          type: object
          properties:
            state: { type: string, enum: [pending, approved, rejected] }
            reviewedByActorId:
              oneOf:
                - $ref: "#/components/schemas/Uuid"
                - type: "null"
            reviewedAt:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            rejectionReason: { type: [string, "null"] }
        gitOperationId:
          type: "null"
        author: { $ref: "#/components/schemas/Actor" }
        authorHistory:
          type: object
          description: The author's history with this book, so a tenth spam comment reads as the tenth.
          properties:
            pending: { type: integer }
            approved: { type: integer }
            rejected: { type: integer }
        createdAt: { $ref: "#/components/schemas/Timestamp" }
        updatedAt: { $ref: "#/components/schemas/Timestamp" }

    Membership:
      type: object
      required: [id, projectId, actorId, role, scopes, createdAt, revokedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        actorId:
          $ref: "#/components/schemas/Uuid"
        role:
          type: string
          enum: [reader, contributor, editor, maintainer]
        scopes:
          type: array
          description: The role's scope bundle at grant time.
          items:
            $ref: "#/components/schemas/Scope"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    PublicationCallbackResult:
      type: object
      required: [duplicate, applied]
      properties:
        duplicate:
          type: boolean
          description: The delivery id had already been seen; nothing was applied.
        applied:
          type: boolean
        publicationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        publication:
          oneOf:
            - $ref: "#/components/schemas/Publication"
            - type: "null"

    Publication:
      type: object
      description: >
        One integrated commit's publication state as reported by CI
        (design §17.3). Never inferred from a successful Git commit.
      required: [id, integratedCommit, buildStatus, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        integratedCommit:
          type: string
          description: Repository commit CI built from.
        buildStatus:
          type: string
          enum: [queued, building, succeeded, failed]
        deployedCommit:
          description: Commit actually serving the public site, per CI.
          oneOf:
            - type: string
            - type: "null"
        publicUrl:
          oneOf:
            - type: string
              format: uri
            - type: "null"
        deployedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        publisherVersion:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    PublicationStatus:
      type: object
      description: >
        Integrated versus deployed (design §17.3): `integratedCommit` is what
        Authorbot projected, `deployedCommit` is what CI says is live. They are
        reported separately so the gap is visible rather than assumed.
      required: [integratedCommit, deployedCommit, buildStatus, inSync]
      properties:
        integratedCommit:
          oneOf:
            - type: string
            - type: "null"
        deployedCommit:
          oneOf:
            - type: string
            - type: "null"
        buildStatus:
          description: Build status of the most recent publication CI reported.
          oneOf:
            - type: string
              enum: [queued, building, succeeded, failed]
            - type: "null"
        publicUrl:
          oneOf:
            - type: string
              format: uri
            - type: "null"
        deployedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        publisherVersion:
          oneOf:
            - type: string
            - type: "null"
        inSync:
          type: boolean
          description: >
            True only when both commits are known AND equal. An unknown
            deployment is never reported as up to date.
        latest:
          oneOf:
            - $ref: "#/components/schemas/Publication"
            - type: "null"

    Project:
      type: object
      required: [id, slug, repoProvider, repo, defaultBranch, status, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        slug:
          $ref: "#/components/schemas/Slug"
        repoProvider:
          type: string
          enum: [github]
        repo:
          type: string
          description: "`owner/name`, e.g. `JoeMattie/causal-projector`."
        defaultBranch:
          type: string
        status:
          type: string
          enum: [active, invalid, diverged, archived]
        gitIntegration:
          type: string
          enum: [configured, unconfigured, incomplete, invalid]
          description: >
            Whether this deployment holds a usable GitHub App credential set
            (Phase 5 §2). `unconfigured` means reads work and mutations are
            accepted and queued, but nothing is committed to the repository;
            `incomplete` means some but not all of GITHUB_APP_ID,
            GITHUB_APP_PRIVATE_KEY and GITHUB_INSTALLATION_ID are set;
            `invalid` means all three are present but at least one cannot work
            (a PKCS#1 private key, a non-numeric app or installation id).
            `incomplete` and `invalid` are both treated exactly like
            `unconfigured` at runtime. `configured` means all three are present
            and well-formed. No credential value is ever exposed.
        projection:
          type: object
          description: >
            State of the database projection relative to the repository
            (Phase 5 §6, design §20.3).
          required: [commit, stale]
          properties:
            commit:
              description: >
                Repository commit the projection was last built from - the
                *integrated* commit. Null before the first successful refresh.
              oneOf:
                - type: string
                - type: "null"
            stale:
              type: boolean
              description: >
                A verified push has arrived that the projection has not yet
                absorbed. Set before the refresh is attempted, so a refresh
                that never ran is still visible as owed work.
        divergence:
          type: object
          description: >
            Design §14.5 divergence state. While `diverged`, prose writes are
            refused with the `project-diverged` problem and reads continue.
          required: [state]
          properties:
            state:
              type: string
              enum: [ok, diverged]
            divergedAt:
              oneOf:
                - $ref: "#/components/schemas/Timestamp"
                - type: "null"
            kinds:
              type: array
              items:
                type: string
                enum: [revision-regressed, anchor-blocks-vanished]
            chapters:
              type: array
              items:
                type: object
                properties:
                  chapterId:
                    $ref: "#/components/schemas/Uuid"
                  path:
                    type: string
                  kind:
                    type: string
                  projectedRevision:
                    type: integer
                  snapshotRevision:
                    type: integer
        publication:
          $ref: "#/components/schemas/PublicationStatus"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    AgentToken:
      type: object
      description: Agent token metadata; the secret itself is never returned after minting.
      required:
        - id
        - projectId
        - actorId
        - name
        - scopes
        - capabilityMode
        - grantedCapabilities
        - roleCapabilityCeiling
        - effectiveCapabilities
        - legacyEffectiveActions
        - createdBy
        - createdAt
        - expiresAt
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        actorId:
          description: The agent actor created for this token.
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        scopes:
          type: array
          deprecated: true
          description: Compatibility shadow for legacy deployments; do not infer authority from it.
          items:
            $ref: "#/components/schemas/Scope"
        capabilityMode:
          $ref: "#/components/schemas/CapabilityMode"
        grantedCapabilities:
          $ref: "#/components/schemas/EditorialCapabilitySet"
        roleCapabilityCeiling:
          $ref: "#/components/schemas/EditorialCapabilitySet"
        effectiveCapabilities:
          $ref: "#/components/schemas/EditorialCapabilitySet"
        legacyEffectiveActions:
          type: array
          items:
            $ref: "#/components/schemas/LegacyEffectiveAction"
        createdBy:
          description: Actor id of the minting maintainer.
          $ref: "#/components/schemas/Uuid"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        expiresAt:
          $ref: "#/components/schemas/Timestamp"
        lastUsedAt:
          description: Updated at most once per minute.
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    RepositoryDocumentKind:
      type: string
      enum: [outline, timeline, character]

    RevisionProposalTargetKind:
      type: string
      enum: [chapter, outline, timeline, character]

    RepositoryDocumentTarget:
      type: object
      additionalProperties: false
      required: [kind, id, path, label]
      properties:
        kind:
          $ref: "#/components/schemas/RepositoryDocumentKind"
        id:
          type: string
          minLength: 1
          description: "`outline`, `timeline`, or the character's canonical id."
        path:
          type: string
          minLength: 1
          maxLength: 1024
        label:
          type: string

    RepositoryDocumentSource:
      type: object
      additionalProperties: false
      required: [target, content, contentHash]
      properties:
        target:
          $ref: "#/components/schemas/RepositoryDocumentTarget"
        content:
          type: string
          description: Canonical repository source, including document metadata.
        contentHash:
          $ref: "#/components/schemas/ContentHash"

    RevisionProposalType:
      type: string
      enum: [chapter_replacement, chapter_summary, repository_document]

    RevisionProposalOrigin:
      type: string
      enum: [work_submission, direct_edit, summary_proposal, history_restore, document_edit]

    RevisionProposalStatus:
      type: string
      enum: [pending_review, applying, approved, rejected, conflicted, withdrawn]

    RevisionProposalTarget:
      type: object
      description: Stable generic target metadata for revision review clients.
      required: [kind, id, path, label]
      properties:
        kind:
          $ref: "#/components/schemas/RevisionProposalTargetKind"
        id:
          type: string
          minLength: 1
          description: Chapter UUID, singleton document kind, or canonical character id.
        path:
          type: string
        label:
          type: string

    RevisionProposalActor:
      type: object
      description: Display-safe actor attribution without external identity data.
      required: [id, displayName, type]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        displayName:
