            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        submissionId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        baseRevision:
          description: Current chapter revision, or null for a repository document.
          oneOf:
            - type: integer
              minimum: 1
            - type: "null"
        baseContentHash:
          $ref: "#/components/schemas/ContentHash"
        changeSummary:
          oneOf:
            - type: string
            - type: "null"
        notes:
          oneOf:
            - type: string
            - type: "null"
        status:
          $ref: "#/components/schemas/RevisionProposalStatus"
        reviewedByActorId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        reviewedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        reviewReason:
          oneOf:
            - type: string
            - type: "null"
        gitOperationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        operationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        resultingRevision:
          oneOf:
            - type: integer
              minimum: 1
            - type: "null"
        commitSha:
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
        target:
          $ref: "#/components/schemas/RevisionProposalTarget"
        currentRevision:
          oneOf:
            - type: integer
              minimum: 1
            - type: "null"
        currentContentHash:
          oneOf:
            - $ref: "#/components/schemas/ContentHash"
            - type: "null"
        conflictWarning:
          type: boolean
        author:
          oneOf:
            - $ref: "#/components/schemas/RevisionProposalActor"
            - type: "null"
        reviewedBy:
          oneOf:
            - $ref: "#/components/schemas/RevisionProposalActor"
            - type: "null"
        workItem:
          oneOf:
            - $ref: "#/components/schemas/RevisionProposalWork"
            - type: "null"
        chapter:
          oneOf:
            - $ref: "#/components/schemas/RevisionProposalChapter"
            - type: "null"

    CreateRevisionProposal:
      oneOf:
        - $ref: "#/components/schemas/CreateChapterReplacementProposal"
        - $ref: "#/components/schemas/CreateChapterSummaryProposal"
        - $ref: "#/components/schemas/CreateRepositoryDocumentProposal"
      discriminator:
        propertyName: proposalType
        mapping:
          chapter_replacement: "#/components/schemas/CreateChapterReplacementProposal"
          chapter_summary: "#/components/schemas/CreateChapterSummaryProposal"
          repository_document: "#/components/schemas/CreateRepositoryDocumentProposal"

    CreateChapterReplacementProposal:
      type: object
      additionalProperties: false
      required:
        [chapterId, proposalType, baseRevision, baseContentHash, proposedContent]
      properties:
        chapterId:
          $ref: "#/components/schemas/Uuid"
        proposalType:
          type: string
          const: chapter_replacement
        baseRevision:
          type: integer
          minimum: 1
        baseContentHash:
          $ref: "#/components/schemas/ContentHash"
        proposedContent:
          type: string
          maxLength: 524288
        changeSummary:
          type: string
          minLength: 1
          maxLength: 2000
        notes:
          type: string
          maxLength: 10000
        applyImmediately:
          type: boolean
          default: false

    CreateChapterSummaryProposal:
      type: object
      additionalProperties: false
      required:
        [chapterId, proposalType, baseRevision, baseContentHash, proposedContent]
      properties:
        chapterId:
          $ref: "#/components/schemas/Uuid"
        proposalType:
          type: string
          const: chapter_summary
        baseRevision:
          type: integer
          minimum: 1
        baseContentHash:
          $ref: "#/components/schemas/ContentHash"
        proposedContent:
          type: string
          maxLength: 2000
          description: Replacement summary. An empty string removes the summary.
        changeSummary:
          type: string
          minLength: 1
          maxLength: 2000
        notes:
          type: string
          maxLength: 10000
        applyImmediately:
          type: boolean
          default: false

    CreateRepositoryDocumentProposal:
      type: object
      additionalProperties: false
      required:
        [proposalType, targetKind, targetPath, baseContentHash, proposedContent]
      properties:
        proposalType:
          type: string
          const: repository_document
        targetKind:
          $ref: "#/components/schemas/RepositoryDocumentKind"
        targetPath:
          type: string
          minLength: 1
          maxLength: 1024
          description: Configured safe repository-relative document path.
        baseContentHash:
          $ref: "#/components/schemas/ContentHash"
        proposedContent:
          type: string
          minLength: 1
          maxLength: 524288
          description: Complete replacement document, limited to 512 KiB after UTF-8 encoding.
        changeSummary:
          type: string
          minLength: 1
          maxLength: 2000
        notes:
          type: string
          maxLength: 10000
        applyImmediately:
          type: boolean
          default: false

    RevisionReview:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000

    RevisionProposalCommandResult:
      type: object
      required: [proposalId, operationId, correlationId, status]
      properties:
        proposalId:
          $ref: "#/components/schemas/Uuid"
        operationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        correlationId:
          type: string
        status:
          $ref: "#/components/schemas/RevisionProposalStatus"

    ChapterHistoryActor:
      type: object
