      properties:
        chapterId:
          $ref: "#/components/schemas/Uuid"
        compare:
          type: string
          enum: [previous, current]
        selected:
          $ref: "#/components/schemas/ChapterHistorySnapshot"
        comparison:
          oneOf:
            - $ref: "#/components/schemas/ChapterHistorySnapshot"
            - type: "null"
        current:
          $ref: "#/components/schemas/ChapterHistoryCurrent"
        diff:
          oneOf:
            - $ref: "#/components/schemas/ChapterHistoryDiff"
            - type: "null"

    ChapterHistoryRestoreResult:
      type: object
      additionalProperties: false
      required: [proposalId, status, correlationId]
      properties:
        proposalId:
          $ref: "#/components/schemas/Uuid"
        status:
          type: string
          const: pending_review
        correlationId:
          type: string

    ChapterStatus:
      type: string
      enum: [draft, proposed, published, archived]

    Chapter:
      type: object
      description: Chapter projection (design §9.1), rebuilt from the book repository.
      required:
        [id, projectId, path, slug, title, order, status, revision, contentHash, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        path:
          type: string
          description: Repo-relative path, e.g. `chapters/001-baseline.md`.
        slug:
          $ref: "#/components/schemas/Slug"
        title:
          type: string
        order:
          description: Chapter reading order from frontmatter; null only while a migrated projection awaits refresh.
          oneOf:
            - type: number
            - type: "null"
        status:
          $ref: "#/components/schemas/ChapterStatus"
        revision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        headCommit:
          description: Git commit SHA of the current integrated revision, when known.
          oneOf:
            - type: string
            - type: "null"
        lastPublishedCommit:
          oneOf:
            - type: string
            - type: "null"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
        blockIds:
          type: array
          description: Valid block ids of this revision (persisted on the chapter projection).
          items:
            $ref: "#/components/schemas/Uuid"

    ChapterSummary:
      allOf:
        - $ref: "#/components/schemas/Chapter"
        - type: object
          required: [activity]
          properties:
            activity:
              $ref: "#/components/schemas/ChapterActivity"

    ChapterActivity:
      type: object
      additionalProperties: false
      description: >-
        Open collaboration activity for a chapter. Each count is a
        non-negative integer. Categories the caller is not authorized to read
        are omitted rather than reported as zero.
      properties:
        openSuggestions:
          type: integer
          minimum: 0
          description: Open suggested edits at any chapter scope.
        openBlockComments:
          type: integer
          minimum: 0
          description: Open comments anchored to a block or text range.
        openChapterComments:
          type: integer
          minimum: 0
          description: Open whole-chapter comments.
        openReplies:
          type: integer
          minimum: 0
          description: Open replies whose readable parent feedback is also open.
        openWorkItems:
          type: integer
          minimum: 0
          description: Work items in a non-terminal domain lifecycle state.

    AnnotationKind:
      type: string
      enum: [comment, suggestion]

    AnnotationScope:
      type: string
      enum: [range, block, chapter]

    AnnotationStatus:
      type: string
      description: |
        `pending_git` is API/DB-only: the command is accepted but its Git
        operation has not committed yet. Artifact frontmatter never carries it.
      enum:
        - pending_git
        - open
        - work_item_created
        - accepted
        - resolved
        - rejected
        - withdrawn
        - superseded
        - orphaned
        - needs_reanchor

    TextPosition:
      type: object
      description: Offsets in the normalized plain-text stream of the block.
      required: [start, end]
      properties:
        start:
          type: integer
          minimum: 0
        end:
          type: integer
          minimum: 0

    TextQuote:
      type: object
      required: [exact]
      properties:
        exact:
          type: string
        prefix:
          type: string
          description: Roughly 32 normalized characters before the selection.
        suffix:
          type: string
          description: Roughly 32 normalized characters after the selection.

    AnnotationTarget:
      type: object
      description: Independent selectors for range/block targets (design §10.1).
      required: [blockId]
      properties:
        blockId:
          $ref: "#/components/schemas/Uuid"
        textPosition:
          $ref: "#/components/schemas/TextPosition"
        textQuote:
          $ref: "#/components/schemas/TextQuote"

    VoteSummary:
      type: object
      description: Current vote aggregate for an annotation.
      properties:
        approvals:
          type: integer
        rejections:
          type: integer
        abstentions:
          type: integer
        netScore:
          type: number
        distinctVoters:
          type: integer
        humanApprovals:
          type: integer
        agentApprovals:
          type: integer

    Annotation:
      type: object
      required:
        [
          id,
          projectId,
          chapterId,
          kind,
          scope,
          chapterRevision,
          target,
          authorActorId,
          body,
          status,
          gitOperationId,
          supersededBy,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        chapterId:
          $ref: "#/components/schemas/Uuid"
        kind:
          $ref: "#/components/schemas/AnnotationKind"
        scope:
          $ref: "#/components/schemas/AnnotationScope"
        chapterRevision:
          type: integer
          minimum: 1
        target:
          description: Null for chapter-scoped annotations.
          oneOf:
            - $ref: "#/components/schemas/AnnotationTarget"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        body:
          type: string
          description: Markdown body. Untrusted content.
        status:
          $ref: "#/components/schemas/AnnotationStatus"
        gitOperationId:
          description: The most recent Git operation mirroring this record.
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        supersededBy:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    Reply:
      type: object
      required:
        [id, projectId, annotationId, parentReplyId, authorActorId, body, status, gitOperationId, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        annotationId:
          $ref: "#/components/schemas/Uuid"
        parentReplyId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        body:
          type: string
        status:
          type: string
          # Mirrors the replies.status DB CHECK constraint; `withdrawn` is not
          # produced by any implemented endpoint yet but is a legal state.
          enum: [pending_git, open, withdrawn]
        gitOperationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    VoteValue:
      type: string
      enum: [approve, reject, abstain]

    Vote:
      type: object
      description: One current vote per actor per annotation (design §9.1).
      required: [annotationId, actor, value, createdAt]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        actor:
          $ref: "#/components/schemas/ActorRef"
        value:
          $ref: "#/components/schemas/VoteValue"
        weight:
          type: number
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    Decision:
      type: object
      description: Sticky record of a rule threshold crossing (design §11.3).
      required: [id, sourceAnnotationId, rule, ruleVersion, result]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        sourceAnnotationId:
          $ref: "#/components/schemas/Uuid"
        rule:
          type: string
        ruleVersion:
          type: integer
        metrics:
          type: object
          additionalProperties:
            type: number
        result:
          type: string
          enum: [create_work_item, rejected, support_changed, overridden]
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        effectiveAt:
          $ref: "#/components/schemas/Timestamp"
        overrideReason:
          type: string

    DecisionSummary:
      type: object
      description: |
        Decision projection embedded in vote and work-item responses (Phase 3
        contract §4). Aggregate metrics only - never per-voter data (§26.1).
      required:
        [id, sourceAnnotationId, actionType, rule, ruleVersion, metrics, result, supportChanged, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        sourceAnnotationId:
          $ref: "#/components/schemas/Uuid"
        actionType:
          type: string
          enum: [create_work_item, reject_suggestion, reopen_suggestion, cancel_work_item]
        rule:
          type: string
        ruleVersion:
          type: integer
          minimum: 0
          description: 0 marks a maintainer override; >= 1 is a rule crossing.
        metrics:
          type: object
          additionalProperties:
            type: number
        result:
          type: string
          enum: [create_work_item, rejected, support_changed, overridden]
        supportChanged:
          type: boolean
        overrideReason:
          oneOf:
            - type: string
            - type: "null"
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    VoteResult:
      type: object
      description: Response to casting or clearing a vote (Phase 3 contract §2-§4).
      required: [annotationId, value, votes, ruleSatisfied, decision]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        value:
          description: The caller's new current vote, or null after a clear.
          oneOf:
            - $ref: "#/components/schemas/VoteValue"
            - type: "null"
        votes:
          $ref: "#/components/schemas/VoteSummary"
        ruleSatisfied:
          type: boolean
          description: Whether the rule is currently satisfied for this suggestion.
        decision:
          description: The sticky decision, if one exists for this suggestion.
          oneOf:
            - $ref: "#/components/schemas/DecisionSummary"
            - type: "null"

    AnnotationOverrideResult:
      type: object
      description: Response to a maintainer suggestion override (Phase 3 contract §4).
      required: [annotationId, status, decisionId, operationIds, correlationId]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        status:
          $ref: "#/components/schemas/AnnotationStatus"
        decisionId:
          $ref: "#/components/schemas/Uuid"
        operationIds:
          type: array
          items:
            $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string

    WorkItemType:
      type: string
      enum:
        - revise_range
        - revise_block
        - revise_chapter
        - write_chapter
        - resolve_conflict
        - planning

    WorkItemStatus:
      type: string
      enum:
        - ready
        - leased
        - submitted
        - applying
        - completed
        - conflict
        - failed
        - cancelled

    WorkItem:
      type: object
      required: [id, type, status, priority, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          $ref: "#/components/schemas/WorkItemType"
        status:
          $ref: "#/components/schemas/WorkItemStatus"
        sourceAnnotationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        baseRevision:
          type: integer
          minimum: 1
        priority:
          type: string
          enum: [low, normal, high]
        acceptanceCriteria:
          type: array
          items:
            type: string
        currentLeaseId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdBy:
          $ref: "#/components/schemas/ActorRef"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    CompletedWorkSource:
      type: object
      additionalProperties: false
      required: [kind, scope, body, status]
      properties:
        kind:
          $ref: "#/components/schemas/AnnotationKind"
        scope:
          $ref: "#/components/schemas/AnnotationScope"
        body:
          type: string
          description: Source feedback text; completed submission prose is not included.
        status:
          $ref: "#/components/schemas/AnnotationStatus"

    CompletedWorkChapter:
      type: object
      additionalProperties: false
      required: [id, title, slug]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        title:
          type: string
        slug:
          $ref: "#/components/schemas/Slug"

    CompletedWorkActor:
      type: object
      additionalProperties: false
      required: [actorId, type, displayName, externalIdentity]
      properties:
        actorId:
          $ref: "#/components/schemas/Uuid"
        type:
          type: string
          enum: [human, agent, system]
        displayName:
          type: string
        externalIdentity:
          oneOf:
            - type: string
            - type: "null"

    CompletedWorkItem:
      type: object
      additionalProperties: false
      description: >-
        Compact completed-work history. It contains attribution and integration
        links, never the retained prose of the completing submission.
      required:
        - id
        - projectId
        - type
        - status
        - sourceAnnotationId
        - chapterId
        - baseRevision
        - target
        - priority
        - createdAt
        - updatedAt
        - source
        - chapter
        - completedBy
        - completedAt
        - resultingRevision
        - commitSha
        - revisionProposalId
        - approvedBy
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        type:
          $ref: "#/components/schemas/WorkItemType"
        status:
          type: string
          const: completed
        sourceAnnotationId:
          $ref: "#/components/schemas/Uuid"
        chapterId:
          $ref: "#/components/schemas/Uuid"
        baseRevision:
          type: integer
          minimum: 1
        target:
          description: Source annotation target snapshot, or null for chapter scope.
        priority:
          type: string
          enum: [low, normal, high]
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
        source:
          oneOf:
            - $ref: "#/components/schemas/CompletedWorkSource"
            - type: "null"
        chapter:
          oneOf:
            - $ref: "#/components/schemas/CompletedWorkChapter"
            - type: "null"
        completedBy:
          oneOf:
            - $ref: "#/components/schemas/CompletedWorkActor"
            - type: "null"
        completedAt:
          $ref: "#/components/schemas/Timestamp"
        resultingRevision:
          oneOf:
            - type: integer
              minimum: 1
            - type: "null"
        commitSha:
          oneOf:
            - type: string
            - type: "null"
        revisionProposalId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        approvedBy:
          oneOf:
            - $ref: "#/components/schemas/CompletedWorkActor"
            - type: "null"

    Lease:
      type: object
      description: Server-enforced capability; the token appears only in claim responses.
      required: [id, workItemId, holder, issuedAt, expiresAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        workItemId:
          $ref: "#/components/schemas/Uuid"
        holder:
          $ref: "#/components/schemas/ActorRef"
        issuedAt:
          $ref: "#/components/schemas/Timestamp"
        expiresAt:
          $ref: "#/components/schemas/Timestamp"
        renewalCount:
          type: integer
          minimum: 0
        maxExpiresAt:
          $ref: "#/components/schemas/Timestamp"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    SubmissionType:
      type: string
      enum: [range_replacement, block_replacement, chapter_replacement]

    SubmissionState:
      type: string
      enum: [received, validating, applying, applied, rejected, conflict]

    Submission:
      type: object
      required: [id, actor, type, state, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        actor:
          $ref: "#/components/schemas/ActorRef"
        type:
          $ref: "#/components/schemas/SubmissionType"
        baseRevision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        validationResult:
          type: object
          properties:
            valid:
              type: boolean
            findings:
              type: array
              items:
                type: object
                required: [code, severity, message]
                properties:
                  code:
                    type: string
                  severity:
                    type: string
                    enum: [error, warning]
                  path:
                    type: string
                  message:
                    type: string
                  pointer:
                    type: string
        integrationCommit:
          oneOf:
            - type: string
            - type: "null"
        state:
          $ref: "#/components/schemas/SubmissionState"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Operation:
      type: object
      description: Asynchronous Git operation (design §9.1 GitOperation, §20.2 states).
      required:
        [id, projectId, correlationId, state, attempts, commitSha, error, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
          description: Correlation id of the accepted command (client-supplied or generated).
        state:
          type: string
          enum:
            - queued
            - preparing
            - committing
            - committed
            - verified
            - conflict
            - failed
        attempts:
          type: integer
          minimum: 0
        commitSha:
          oneOf:
            - type: string
            - type: "null"
        error:
          description: Terminal or most recent failure message, when any.
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    TaskBundle:
      type: object
      description: Claim response with full working context (design §15.3). All prose fields are untrusted input; bundles never contain deployment secrets or hidden instructions.
      required: [workItem, lease, document, context, submissionSchema]
      properties:
        workItem:
          type: object
          additionalProperties: false
          description: The compact claimed work item, including acceptance criteria.
          required: [id, type, acceptanceCriteria, priority]
          properties:
            id:
              $ref: "#/components/schemas/Uuid"
            type:
              $ref: "#/components/schemas/WorkItemType"
            acceptanceCriteria:
              type: array
              items:
                type: string
            priority:
              type: string
              enum: [low, normal, high]
        lease:
          type: object
          additionalProperties: false
          required: [id, expiresAt, maxExpiresAt, renewalPromptAt]
          oneOf:
            - required: [token]
            - required: [tokenRedacted]
          properties:
            id:
              $ref: "#/components/schemas/Uuid"
            token:
              type: string
              description: Opaque lease secret, returned once; only its hash is stored.
            tokenRedacted:
              type: boolean
              const: true
              description: Present instead of token on an idempotent replay.
            expiresAt:
              $ref: "#/components/schemas/Timestamp"
            maxExpiresAt:
              $ref: "#/components/schemas/Timestamp"
            renewalPromptAt:
              $ref: "#/components/schemas/Timestamp"
              description: When a client should offer renewal - expiresAt minus the configured lead time.
        document:
          type: object
          required: [chapterId, revision, contentHash, source]
          properties:
            chapterId:
              $ref: "#/components/schemas/Uuid"
            revision:
              type: integer
              minimum: 1
            contentHash:
              $ref: "#/components/schemas/ContentHash"
            source:
              type: string
              description: Full chapter Markdown at the base revision.
        target:
          type: object
          description: Present for range/block work; resolved against the base revision.
          properties:
            blockId:
              $ref: "#/components/schemas/Uuid"
            exact:
              type: string
            start:
              type: integer
              minimum: 0
            end:
              type: integer
              minimum: 0
        context:
          type: object
          description: Untrusted project data assembled for the claimant.
          required: [annotationBody, chapterSummary, storyRefs, storyApi]
          properties:
            annotationBody:
              type: string
            chapterSummary:
              type: string
            storyRefs:
              type: array
              items:
                $ref: "#/components/schemas/StoryNodeId"
            storyApi:
              $ref: "#/components/schemas/StoryApiLinks"
        submissionSchema:
          oneOf:
            - type: string
            - type: "null"
          description: >-
            Schema id the submission payload must satisfy, or `null` for work
            item types that are claimable but have no submission flow yet
            (`write_chapter`, `planning` - Phase 4 contract §1). Those types
            return 201 with this field present and null, so generated clients
            must treat it as nullable.
          examples:
            - authorbot.submission/range-replacement/v1

    StoryGraph:
      type: object
      description: Structural projection of `story/outline.yml` (authorbot.story-graph/v1).
      required: [schema, nodes]
      properties:
        schema:
          type: string
          const: authorbot.story-graph/v1
        nodes:
          type: array
          items:
            type: object
            required: [id, type, order]
            properties:
              id:
                $ref: "#/components/schemas/StoryNodeId"
              type:
                type: string
                enum: [premise, arc, part, chapter, scene, beat, custom]
              title:
                type: string
              summary:
                type: string
              parent:
                $ref: "#/components/schemas/StoryNodeId"
              order:
                type: number
              tags:
                type: array
                items: { type: string }
              chapter_id:
                $ref: "#/components/schemas/Uuid"
              status:
                type: string
                enum: [draft, published, archived]
              goal:
                type: string
              conflict:
                type: string
              outcome:
                type: string
        links:
          type: array
          items:
            type: object
            required: [from, to, type]
            properties:
              from:
                $ref: "#/components/schemas/StoryNodeId"
              to:
                $ref: "#/components/schemas/StoryNodeId"
              type:
                type: string

    Timeline:
      type: object
      description: Structural projection of `story/timeline.yml` (authorbot.timeline/v1).
      required: [schema, events]
      properties:
        schema:
          type: string
          const: authorbot.timeline/v1
        calendar:
          type: object
          additionalProperties: false
          required: [type]
          properties:
            type: { type: string }
            epoch_label: { type: string }
        events:
          type: array
          items:
            type: object
            required: [id, sort_key, display_time, title]
            properties:
              id:
                $ref: "#/components/schemas/StoryNodeId"
              sort_key:
                type: number
              display_time:
                type: string
              title:
                type: string
              participants:
                type: array
                items:
                  $ref: "#/components/schemas/StoryNodeId"
              locations:
                type: array
                items:
                  $ref: "#/components/schemas/StoryNodeId"
              chapter_refs:
                type: array
                items:
                  $ref: "#/components/schemas/Uuid"
              facts:
                type: array
                items:
                  type: string

    Character:
      type: object
      description: Character record projection (authorbot.character/v1).
      additionalProperties: false
      required: [schema, id, name]
      properties:
        schema:
          type: string
          const: authorbot.character/v1
        id:
          $ref: "#/components/schemas/StoryNodeId"
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        summary:
          type: string
        status:
          type: string

    StoryApiLinks:
      type: object
      additionalProperties: false
      required: [outline, timeline, characters]
      description: Canonical same-origin API paths; claimants follow these instead of guessing routes.
      properties:
        outline: { type: string }
        timeline: { type: string }
        characters: { type: string }

    StoryOutlineResponse:
      type: object
      additionalProperties: false
      required: [path, contentHash, outline, links]
      properties:
        path: { type: string }
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        outline:
          $ref: "#/components/schemas/StoryGraph"
        links:
          $ref: "#/components/schemas/StoryApiLinks"

    StoryTimelineResponse:
      type: object
      additionalProperties: false
      required: [path, contentHash, timeline, links]
      properties:
        path: { type: string }
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        timeline:
          $ref: "#/components/schemas/Timeline"
        links:
          $ref: "#/components/schemas/StoryApiLinks"

    StoryCharacterItem:
      type: object
      additionalProperties: false
      required: [path, contentHash, character, body]
      properties:
        path: { type: string }
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        character:
          $ref: "#/components/schemas/Character"
        body:
          type: string
          description: Validated Markdown body with raw HTML and forbidden URL schemes rejected.

    StoryCharacterPage:
      type: object
      additionalProperties: false
      required: [items, nextCursor, links]
      properties:
        items:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/StoryCharacterItem"
        nextCursor:
          $ref: "#/components/schemas/NextCursor"
        links:
          $ref: "#/components/schemas/StoryApiLinks"

    Event:
      type: object
      description: SSE payload shape (design §15.5). Notification only; refetch authoritative resources.
      additionalProperties: false
      required: [id, type, payload, createdAt]
      properties:
        id:
          type: integer
          minimum: 1
        type:
          type: string
          minLength: 1
        payload:
          type: object
          description: Event-specific reference payload (ids, not full resources).
          additionalProperties: true
        createdAt:
          $ref: "#/components/schemas/Timestamp"
