              schema:
                type: object
                required: [items, latestId]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  latestId:
                    type: integer
                    description: Highest event id in this page (the next cursor).
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
