openapi: 3.1.0

info:
  title: Authorbot API
  version: 1.0.0-alpha.0
  summary: Coordination-plane API for Authorbot book projects.
  description: |
    Skeleton of the Authorbot v1 API per design §15.

    Conventions (design §15.1):
    - All paths are prefixed with `/v1`.
    - Entity identifiers are UUIDv7, lowercase.
    - Timestamps are UTC RFC 3339 (`2026-07-19T18:00:00Z`).
    - Mutation endpoints require an `Idempotency-Key` header.
    - Editable resources return `ETag` and honor `If-Match`.
    - Errors are `application/problem+json` (RFC 9457).
    - List endpoints use cursor pagination (`cursor`, `limit`, `nextCursor`).
    - Every response carries `X-Correlation-Id`; asynchronous commands return
      an operation id resolvable at `/v1/projects/{projectId}/operations/{operationId}`.
    - Humans (GitHub-backed session cookie) and agents (bearer token) are
      treated identically after authorization.

    Implementation status: operations marked `x-implementation-status: planned`
    are design skeleton for later phases and are not served yet. Everything
    else matches the Phase 2 implementation (`apps/api`). Operations marked
    `x-dev-only: true` exist only when the deployment runs `AUTH_MODE=dev`;
    operations marked `x-auth-mode: github` only under `AUTH_MODE=github`.
  license:
    name: UNLICENSED
    identifier: LicenseRef-Authorbot-Internal

servers:
  - url: /
    description: Same-origin deployment; paths already include the /v1 prefix.

security:
  - githubSession: []
  - agentToken: []

tags:
  - name: identity
    description: Identity and project metadata (design §15.2, identity block).
  - name: chapters
    description: Chapters and story documents.
  - name: annotations
    description: Annotations, replies, votes, and re-anchoring.
  - name: work
    description: Work items, leases, and submissions (design §12).
  - name: operations
    description: Git operations, event stream, and webhooks.

paths:
  /v1/me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Return the authenticated actor, memberships, and effective scopes.
      responses:
        "200":
          description: The current actor.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: object
                required: [actor, memberships, scopes, authKind]
                properties:
                  actor:
                    $ref: "#/components/schemas/Actor"
                  memberships:
                    type: array
                    items:
                      $ref: "#/components/schemas/Membership"
                  scopes:
                    type: array
                    description: Effective scopes (role bundle for sessions, token ∩ bundle for agents).
                    items:
                      $ref: "#/components/schemas/Scope"
                  authKind:
                    type: string
                    enum: [session, token]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/dev/login:
    post:
      operationId: devLogin
      tags: [identity]
      summary: Create or load a dev actor + membership and issue a session cookie.
      description: |
        Mounted ONLY when the deployment runs `AUTH_MODE=dev`; the route does
        not exist under `AUTH_MODE=github`. Creates/loads the actor
        (`github:<login>`), replaces its membership with the requested role,
        and sets the `authorbot_session` cookie.
      x-dev-only: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, role]
              properties:
                login:
                  type: string
                  pattern: "^[A-Za-z0-9][A-Za-z0-9-]{0,38}$"
                role:
                  type: string
                  enum: [reader, contributor, editor, maintainer]
      responses:
        "200":
          description: Session issued; `Set-Cookie` carries the signed session.
          headers:
            Set-Cookie:
              description: "`authorbot_session=<id>.<hmac>; HttpOnly; Secure; SameSite=Lax`"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [actor, membership, scopes]
                properties:
                  actor:
                    $ref: "#/components/schemas/Actor"
                  membership:
                    $ref: "#/components/schemas/Membership"
                  scopes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Scope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/github:
    get:
      operationId: startGithubLogin
      tags: [identity]
      summary: Begin the GitHub OAuth web flow (github mode only).
      x-auth-mode: github
      security: []
      responses:
        "302":
          description: Redirect to GitHub's authorize URL; sets a signed state cookie.

  /v1/auth/github/callback:
    get:
      operationId: finishGithubLogin
      tags: [identity]
      summary: Complete the GitHub OAuth web flow and issue a session (github mode only).
      x-auth-mode: github
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Session issued via `Set-Cookie`; redirects to `/`.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      tags: [identity]
      summary: Return project metadata.
      responses:
        "200":
          description: The project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectMembers
      tags: [identity]
      summary: List project members.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of memberships.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Membership"
                        - type: object
                          required: [actor]
                          properties:
                            actor:
                              description: The member's actor, or null when the row is dangling.
                              oneOf:
                                - $ref: "#/components/schemas/Actor"
                                - type: "null"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/agent-tokens:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createAgentToken
      tags: [identity]
      summary: Mint a named, scoped, expiring agent token (returned once).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, scopes]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                scopes:
                  type: array
                  minItems: 1
                  description: Requested scopes; effective scopes are capped by the agent's pinned `editor` membership bundle.
                  items:
                    $ref: "#/components/schemas/Scope"
                expiresInDays:
                  type: integer
                  minimum: 1
                  maximum: 90
                  default: 30
      responses:
        "201":
          description: Token created; the secret appears exactly once, here.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AgentToken"
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: >-
                          Opaque bearer secret (`authorbot_<43 chars base64url>`);
                          only its SHA-256 hash is stored. Idempotent replays
                          return `tokenRedacted: true` instead.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/agent-tokens/{tokenId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: tokenId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    delete:
      operationId: revokeAgentToken
      tags: [identity]
      summary: Revoke an agent token.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Token revoked (no body).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listChapters
      tags: [chapters]
      summary: List chapter projections.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of chapters.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Chapter"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/chapters/{chapterId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: getChapter
      tags: [chapters]
      summary: Return one chapter projection.
      responses:
        "200":
          description: The chapter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/chapter-submissions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createChapterSubmission
      x-implementation-status: planned
      tags: [chapters]
      summary: Submit a full chapter draft or revision outside the work-item flow.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, content]
              properties:
                type:
                  type: string
                  enum: [full_document]
                chapterId:
                  $ref: "#/components/schemas/Uuid"
                slug:
                  $ref: "#/components/schemas/Slug"
                title:
                  type: string
                baseRevision:
                  type: integer
                  minimum: 1
                baseContentHash:
                  $ref: "#/components/schemas/ContentHash"
                content:
                  type: string
                  description: Full chapter Markdown, including frontmatter and block markers.
                summary:
                  type: string
      responses:
        "202":
          description: Accepted and queued for Git integration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedCommand"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/story/outline:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getStoryOutline
      x-implementation-status: planned
      tags: [chapters]
      summary: Return the story graph (authorbot.story-graph/v1 projection).
      responses:
        "200":
          description: The story graph.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryGraph"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/story/timeline:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getStoryTimeline
      x-implementation-status: planned
      tags: [chapters]
      summary: Return the timeline (authorbot.timeline/v1 projection).
      responses:
        "200":
          description: The timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timeline"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/story/characters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listStoryCharacters
      x-implementation-status: planned
      tags: [chapters]
      summary: List character records.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of characters.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Character"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/chapters/{chapterId}/annotations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: listAnnotations
      tags: [annotations]
      summary: List annotations on a chapter.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of annotations.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Annotation"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createAnnotation
      tags: [annotations]
      summary: Create a comment or suggestion on a chapter (queued for Git mirroring).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [kind, scope, chapterRevision, body]
              description: |
                `target` is required for `range` scope (blockId + textPosition +
                textQuote) and `block` scope (blockId only), and forbidden for
                `chapter` scope. `chapterRevision` must equal the projected
                revision (else 409). Body is Markdown ≤ 32 KiB passing the
                Phase 0 safety rules (no raw HTML, allowed URL schemes only).
              properties:
                kind:
                  $ref: "#/components/schemas/AnnotationKind"
                scope:
                  $ref: "#/components/schemas/AnnotationScope"
                chapterRevision:
                  type: integer
                  minimum: 1
                target:
                  $ref: "#/components/schemas/AnnotationTarget"
                body:
                  type: string
                  description: Markdown body. Untrusted content; sanitized on render.
      responses:
        "202":
          description: Accepted; the record is `pending_git` until its operation commits.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [annotationId]
                    properties:
                      annotationId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/annotations/{annotationId}/replies:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    get:
      operationId: listAnnotationReplies
      tags: [annotations]
      summary: List an annotation's replies (threaded via parentReplyId).
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of replies.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reply"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createAnnotationReply
      tags: [annotations]
      summary: Reply to an annotation (queued for Git mirroring).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [body]
              properties:
                body:
                  type: string
                  description: Markdown body ≤ 32 KiB, same safety rules as annotations.
                parentReplyId:
                  $ref: "#/components/schemas/Uuid"
      responses:
        "202":
          description: Accepted; the reply is `pending_git` until its operation commits.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [replyId]
                    properties:
                      replyId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/annotations/{annotationId}/vote:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    put:
      operationId: putAnnotationVote
      x-implementation-status: planned
      tags: [annotations]
      summary: Create or replace the caller's current vote (one per actor).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  $ref: "#/components/schemas/VoteValue"
      responses:
        "200":
          description: Vote recorded; returns the vote and refreshed aggregate.
          content:
            application/json:
              schema:
                type: object
                required: [vote, voteSummary]
                properties:
                  vote:
                    $ref: "#/components/schemas/Vote"
                  voteSummary:
                    $ref: "#/components/schemas/VoteSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/annotations/{annotationId}/withdraw:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: withdrawAnnotation
      tags: [annotations]
      summary: Withdraw an annotation (author or maintainer; queued for Git mirroring).
      description: |
        Queues a Git operation that rewrites the artifact's frontmatter
        `status`; the record flips to `withdrawn` only after that operation
        commits (until then it still reads `open`, and a failed operation
        leaves it `open` and retryable). Annotations still in `pending_git`
        cannot be withdrawn (409 `state-conflict`).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
      responses:
        "202":
          description: Accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [annotationId]
                    properties:
                      annotationId:
                        $ref: "#/components/schemas/Uuid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/annotations/{annotationId}/reanchor:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: reanchorAnnotation
      x-implementation-status: planned
      tags: [annotations]
      summary: Manually re-anchor an orphaned or needs_reanchor annotation.
      description: Records algorithm version, confidence, and the acting user (design §10.3).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target]
              properties:
                target:
                  $ref: "#/components/schemas/AnnotationTarget"
      responses:
        "200":
          description: Annotation re-anchored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listWorkItems
      x-implementation-status: planned
      tags: [work]
      summary: List work items.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WorkItemStatus"
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WorkItemType"
      responses:
        "200":
          description: A page of work items.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorkItem"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items/{workItemId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    get:
      operationId: getWorkItem
      x-implementation-status: planned
      tags: [work]
      summary: Return one work item.
      responses:
        "200":
          description: The work item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items/{workItemId}/claim:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    post:
      operationId: claimWorkItem
      x-implementation-status: planned
      tags: [work]
      summary: Claim a ready work item; serialized compare-and-set (design §12.2).
      description: |
        Exactly one of two simultaneous claims succeeds. The lease token is
        returned once in the task bundle and only its hash is stored.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                capabilities:
                  type: array
                  description: Optional self-declared capabilities used for matching.
                  items:
                    type: string
      responses:
        "201":
          description: Lease created; the task bundle contains full working context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskBundle"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items/{workItemId}/lease/renew:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    post:
      operationId: renewWorkItemLease
      x-implementation-status: planned
      tags: [work]
      summary: Renew the current lease; bounded by maximum total duration.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseId, leaseToken]
              properties:
                leaseId:
                  $ref: "#/components/schemas/Uuid"
                leaseToken:
                  type: string
      responses:
        "200":
          description: Lease renewed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lease"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items/{workItemId}/lease/release:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    post:
      operationId: releaseWorkItemLease
      x-implementation-status: planned
      tags: [work]
      summary: Release the current lease and return the work item to ready.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseId, leaseToken]
              properties:
                leaseId:
                  $ref: "#/components/schemas/Uuid"
                leaseToken:
                  type: string
      responses:
        "200":
          description: Lease released.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/work-items/{workItemId}/submissions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/WorkItemId"
    post:
      operationId: createWorkItemSubmission
      x-implementation-status: planned
      tags: [work]
      summary: Submit the completed edit for a leased work item (design §12.5).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [leaseId, leaseToken, type, baseRevision, baseContentHash, content]
              properties:
                leaseId:
                  $ref: "#/components/schemas/Uuid"
                leaseToken:
                  type: string
                type:
                  $ref: "#/components/schemas/SubmissionType"
                baseRevision:
                  type: integer
                  minimum: 1
                baseContentHash:
                  $ref: "#/components/schemas/ContentHash"
                content:
                  type: string
                  description: Replacement text or full document per submission type.
                summary:
                  type: string
                testNotes:
                  type: string
      responses:
        "202":
          description: Accepted; validation and Git integration proceed asynchronously.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [submission]
                    properties:
                      submission:
                        $ref: "#/components/schemas/Submission"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "412":
          $ref: "#/components/responses/PreconditionFailed"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/operations/{operationId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: operationId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    get:
      operationId: getOperation
      tags: [operations]
      summary: Return the state of an asynchronous Git operation.
      responses:
        "200":
          description: The operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Operation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/events:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: streamProjectEvents
      x-implementation-status: planned
      tags: [operations]
      summary: Server-Sent Events feed of project activity (design §15.5).
      description: |
        Emits `text/event-stream` events for annotation creation, vote
        aggregate changes, work-item creation, lease state changes, Git
        operation completion, and publication completion. Events are
        notifications only; clients must refetch authoritative resources
        after reconnecting. Supports resumption via `Last-Event-ID`.
      parameters:
        - name: Last-Event-ID
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: An open SSE stream.
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Stream of `event:`/`id:`/`data:` frames; `data` is a JSON
                  object matching #/components/schemas/Event.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/webhooks/github:
    post:
      operationId: receiveGithubWebhook
      tags: [operations]
      summary: Receive GitHub webhook deliveries (signature-verified, deduplicated).
      description: |
        Authenticated by `X-Hub-Signature-256` HMAC, not by session or bearer
        credentials. Delivery IDs are deduplicated (design §14.5, §19.5).
      security: []
      parameters:
        - name: X-GitHub-Event
          in: header
          required: false
          description: Event name; only `push` triggers a rebuild, others are recorded and ignored.
          schema:
            type: string
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema:
            type: string
        - name: X-Hub-Signature-256
          in: header
          required: true
          description: "`sha256=<hex hmac>` over the raw body with WEBHOOK_SECRET."
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw GitHub webhook payload (opaque to this spec).
              additionalProperties: true
      responses:
        "200":
          description: Delivery processed (or recognized as a duplicate / ignored event).
          content:
            application/json:
              schema:
                type: object
                required: [duplicate]
                properties:
                  duplicate:
                    type: boolean
                  rebuilt:
                    type: boolean
                  event:
                    type: string
                    description: Present when the event was recorded but ignored.
                  counts:
                    type: object
                    description: Rebuild result (present after a rebuild).
                    properties:
                      chapters:
                        type: integer
                      annotations:
                        type: integer
                      replies:
                        type: integer
                      preservedPending:
                        type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Projection rebuild failed; the delivery is recorded as `failed`.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

components:
  securitySchemes:
    githubSession:
      type: apiKey
      in: cookie
      name: authorbot_session
      description: |
        Browser session established via GitHub OAuth login (design §19.1).
        HttpOnly, Secure, SameSite cookie; the value is an opaque session id.
    agentToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: |
        Named, scoped, revocable, expiring agent token (design §19.2). Only a
        hash is stored server-side. Humans and agents are treated identically
        after authorization.

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      description: The project UUID or its slug (single-project deployment).
      schema:
        oneOf:
          - $ref: "#/components/schemas/Uuid"
          - $ref: "#/components/schemas/Slug"
    ChapterId:
      name: chapterId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    AnnotationId:
      name: annotationId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    WorkItemId:
      name: workItemId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/Uuid"
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque page cursor from a previous response's `nextCursor`.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Page size; values outside 1..200 are rejected (400).
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: |
        Client-chosen key, unique per (project, actor, key), stored with a
        request hash. Replays return the original result; a replay with a
        different request hash returns 409.
      schema:
        type: string
        minLength: 1
        # Matches the implemented limit (apps/api idempotency middleware
        # MAX_KEY_LENGTH); longer keys are rejected with 400 validation-failed.
        maxLength: 200
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: |
        Entity tag of the revision the client last saw for the editable
        resource being changed. A mismatch returns 412.
      schema:
        type: string

  headers:
    ETag:
      description: Entity tag for the returned revision of an editable resource.
      schema:
        type: string
    XCorrelationId:
      description: Correlation id for tracing this request across the system.
      schema:
        $ref: "#/components/schemas/Uuid"

  responses:
    BadRequest:
      description: Invalid payload.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid credential.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Actor lacks scope or role.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found or intentionally hidden.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Lease, revision, idempotency, or semantic conflict.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    PreconditionFailed:
      description: Failed ETag or explicit precondition.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    UnprocessableEntity:
      description: Valid shape but a domain rule failed.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Rate limit exceeded.
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"

  schemas:
    Uuid:
      type: string
      format: uuid
      description: UUIDv7, lowercase.
      pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
      examples:
        - 0190f301-7045-7b2d-9d91-95b3c8228b54

    Timestamp:
      type: string
      format: date-time
      description: RFC 3339 UTC timestamp.
      examples:
        - 2026-07-19T18:00:00Z

    Slug:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
      description: Path-safe slug (no separators, no leading dots).

    ActorRef:
      type: string
      pattern: "^(github|agent|system):[A-Za-z0-9][A-Za-z0-9_-]*$"
      description: Actor reference, `<namespace>:<identifier>`.
      examples:
        - github:octocat
        - system:rule-engine

    StoryNodeId:
      type: string
      pattern: "^(premise|arc|part|chapter|scene|beat|event|character|location|concept|rule):[a-z0-9][a-z0-9-]*$"
      description: Story node / timeline / bible id, `<kind>:<slug>`.

    ContentHash:
      type: string
      pattern: "^sha256:[0-9a-f]{64}$"
      description: SHA-256 content hash with `sha256:` prefix.

    Scope:
      type: string
      description: |
        Token/membership scope (design §19.2/§19.3). `votes:write` is deferred
        with voting to Phase 3. `work:*`/`submissions:write` are granted now
        and used from Phase 4.
      enum:
        - chapters:read
        - annotations:read
        - annotations:write
        - work:read
        - work:claim
        - submissions:write
        - tokens:manage
        - members:manage

    NextCursor:
      description: Cursor for the next page, or null on the last page.
      oneOf:
        - type: string
        - type: "null"

    Problem:
      type: object
      description: RFC 9457 problem details (`application/problem+json`).
      required: [title, status]
      properties:
        type:
          type: string
          format: uri-reference
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri-reference
        code:
          type: string
          description: Stable machine-readable error code.
        correlationId:
          $ref: "#/components/schemas/Uuid"
      additionalProperties: true

    AcceptedCommand:
      type: object
      description: Envelope for commands queued for asynchronous Git integration.
      required: [operationId, correlationId, status]
      properties:
        operationId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
          description: This request's correlation id (client-supplied or generated).
        status:
          type: string
          enum: [queued]

    Actor:
      type: object
      required: [id, type, displayName, externalIdentity, status, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          type: string
          enum: [human, agent, system]
        displayName:
          type: string
        externalIdentity:
          description: "`<namespace>:<identifier>` (e.g. `github:octocat`, `agent:<actorId>`), or null for out-of-band rows."
          oneOf:
            - $ref: "#/components/schemas/ActorRef"
            - type: "null"
        status:
          type: string
          enum: [active, suspended, revoked]
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Membership:
      type: object
      required: [id, projectId, actorId, role, scopes, createdAt, revokedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        actorId:
          $ref: "#/components/schemas/Uuid"
        role:
          type: string
          enum: [reader, contributor, editor, maintainer]
        scopes:
          type: array
          description: The role's scope bundle at grant time.
          items:
            $ref: "#/components/schemas/Scope"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    Project:
      type: object
      required: [id, slug, repoProvider, repo, defaultBranch, status, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        slug:
          $ref: "#/components/schemas/Slug"
        repoProvider:
          type: string
          enum: [github]
        repo:
          type: string
          description: "`owner/name`, e.g. `JoeMattie/causal-projector`."
        defaultBranch:
          type: string
        status:
          type: string
          enum: [active, invalid, diverged, archived]
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    AgentToken:
      type: object
      description: Agent token metadata; the secret itself is never returned after minting.
      required: [id, projectId, actorId, name, scopes, createdBy, createdAt, expiresAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        actorId:
          description: The agent actor created for this token.
          $ref: "#/components/schemas/Uuid"
        name:
          type: string
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/Scope"
        createdBy:
          description: Actor id of the minting maintainer.
          $ref: "#/components/schemas/Uuid"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        expiresAt:
          $ref: "#/components/schemas/Timestamp"
        lastUsedAt:
          description: Updated at most once per minute.
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    ChapterStatus:
      type: string
      enum: [draft, proposed, published, archived]

    Chapter:
      type: object
      description: Chapter projection (design §9.1), rebuilt from the book repository.
      required:
        [id, projectId, path, slug, title, status, revision, contentHash, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        path:
          type: string
          description: Repo-relative path, e.g. `chapters/001-baseline.md`.
        slug:
          $ref: "#/components/schemas/Slug"
        title:
          type: string
        status:
          $ref: "#/components/schemas/ChapterStatus"
        revision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        headCommit:
          description: Git commit SHA of the current integrated revision, when known.
          oneOf:
            - type: string
            - type: "null"
        lastPublishedCommit:
          oneOf:
            - type: string
            - type: "null"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"
        blockIds:
          type: array
          description: Valid block ids of this revision (persisted on the chapter projection).
          items:
            $ref: "#/components/schemas/Uuid"

    AnnotationKind:
      type: string
      enum: [comment, suggestion]

    AnnotationScope:
      type: string
      enum: [range, block, chapter]

    AnnotationStatus:
      type: string
      description: |
        `pending_git` is API/DB-only: the command is accepted but its Git
        operation has not committed yet. Artifact frontmatter never carries it.
      enum:
        - pending_git
        - open
        - work_item_created
        - accepted
        - resolved
        - rejected
        - withdrawn
        - superseded
        - orphaned
        - needs_reanchor

    TextPosition:
      type: object
      description: Offsets in the normalized plain-text stream of the block.
      required: [start, end]
      properties:
        start:
          type: integer
          minimum: 0
        end:
          type: integer
          minimum: 0

    TextQuote:
      type: object
      required: [exact]
      properties:
        exact:
          type: string
        prefix:
          type: string
          description: Roughly 32 normalized characters before the selection.
        suffix:
          type: string
          description: Roughly 32 normalized characters after the selection.

    AnnotationTarget:
      type: object
      description: Independent selectors for range/block targets (design §10.1).
      required: [blockId]
      properties:
        blockId:
          $ref: "#/components/schemas/Uuid"
        textPosition:
          $ref: "#/components/schemas/TextPosition"
        textQuote:
          $ref: "#/components/schemas/TextQuote"

    VoteSummary:
      type: object
      description: Current vote aggregate for an annotation.
      properties:
        approvals:
          type: integer
        rejections:
          type: integer
        abstentions:
          type: integer
        netScore:
          type: number
        distinctVoters:
          type: integer
        humanApprovals:
          type: integer
        agentApprovals:
          type: integer

    Annotation:
      type: object
      required:
        [
          id,
          projectId,
          chapterId,
          kind,
          scope,
          chapterRevision,
          target,
          authorActorId,
          body,
          status,
          gitOperationId,
          supersededBy,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        chapterId:
          $ref: "#/components/schemas/Uuid"
        kind:
          $ref: "#/components/schemas/AnnotationKind"
        scope:
          $ref: "#/components/schemas/AnnotationScope"
        chapterRevision:
          type: integer
          minimum: 1
        target:
          description: Null for chapter-scoped annotations.
          oneOf:
            - $ref: "#/components/schemas/AnnotationTarget"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        body:
          type: string
          description: Markdown body. Untrusted content.
        status:
          $ref: "#/components/schemas/AnnotationStatus"
        gitOperationId:
          description: The most recent Git operation mirroring this record.
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        supersededBy:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    Reply:
      type: object
      required:
        [id, projectId, annotationId, parentReplyId, authorActorId, body, status, gitOperationId, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        annotationId:
          $ref: "#/components/schemas/Uuid"
        parentReplyId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        authorActorId:
          $ref: "#/components/schemas/Uuid"
        body:
          type: string
        status:
          type: string
          # Mirrors the replies.status DB CHECK constraint; `withdrawn` is not
          # produced by any implemented endpoint yet but is a legal state.
          enum: [pending_git, open, withdrawn]
        gitOperationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    VoteValue:
      type: string
      enum: [approve, reject, abstain]

    Vote:
      type: object
      description: One current vote per actor per annotation (design §9.1).
      required: [annotationId, actor, value, createdAt]
      properties:
        annotationId:
          $ref: "#/components/schemas/Uuid"
        actor:
          $ref: "#/components/schemas/ActorRef"
        value:
          $ref: "#/components/schemas/VoteValue"
        weight:
          type: number
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    Decision:
      type: object
      description: Sticky record of a rule threshold crossing (design §11.3).
      required: [id, sourceAnnotationId, rule, ruleVersion, result]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        sourceAnnotationId:
          $ref: "#/components/schemas/Uuid"
        rule:
          type: string
        ruleVersion:
          type: integer
        metrics:
          type: object
          additionalProperties:
            type: number
        result:
          type: string
          enum: [create_work_item, rejected, support_changed, overridden]
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        effectiveAt:
          $ref: "#/components/schemas/Timestamp"
        overrideReason:
          type: string

    WorkItemType:
      type: string
      enum:
        - revise_range
        - revise_block
        - revise_chapter
        - write_chapter
        - resolve_conflict
        - planning

    WorkItemStatus:
      type: string
      enum:
        - ready
        - leased
        - submitted
        - applying
        - completed
        - conflict
        - failed
        - cancelled

    WorkItem:
      type: object
      required: [id, type, status, priority, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          $ref: "#/components/schemas/WorkItemType"
        status:
          $ref: "#/components/schemas/WorkItemStatus"
        sourceAnnotationId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        baseRevision:
          type: integer
          minimum: 1
        priority:
          type: string
          enum: [low, normal, high]
        acceptanceCriteria:
          type: array
          items:
            type: string
        currentLeaseId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        createdBy:
          $ref: "#/components/schemas/ActorRef"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Lease:
      type: object
      description: Server-enforced capability; the token appears only in claim responses.
      required: [id, workItemId, holder, issuedAt, expiresAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        workItemId:
          $ref: "#/components/schemas/Uuid"
        holder:
          $ref: "#/components/schemas/ActorRef"
        issuedAt:
          $ref: "#/components/schemas/Timestamp"
        expiresAt:
          $ref: "#/components/schemas/Timestamp"
        renewalCount:
          type: integer
          minimum: 0
        maxExpiresAt:
          $ref: "#/components/schemas/Timestamp"
        revokedAt:
          oneOf:
            - $ref: "#/components/schemas/Timestamp"
            - type: "null"

    SubmissionType:
      type: string
      enum: [range_replacement, block_replacement, full_document]

    SubmissionState:
      type: string
      enum: [received, validating, applying, applied, rejected, conflict]

    Submission:
      type: object
      required: [id, actor, type, state, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        workItemId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        chapterId:
          oneOf:
            - $ref: "#/components/schemas/Uuid"
            - type: "null"
        actor:
          $ref: "#/components/schemas/ActorRef"
        type:
          $ref: "#/components/schemas/SubmissionType"
        baseRevision:
          type: integer
          minimum: 1
        contentHash:
          $ref: "#/components/schemas/ContentHash"
        validationResult:
          type: object
          properties:
            valid:
              type: boolean
            findings:
              type: array
              items:
                type: object
                required: [code, severity, message]
                properties:
                  code:
                    type: string
                  severity:
                    type: string
                    enum: [error, warning]
                  path:
                    type: string
                  message:
                    type: string
                  pointer:
                    type: string
        integrationCommit:
          oneOf:
            - type: string
            - type: "null"
        state:
          $ref: "#/components/schemas/SubmissionState"
        createdAt:
          $ref: "#/components/schemas/Timestamp"

    Operation:
      type: object
      description: Asynchronous Git operation (design §9.1 GitOperation, §20.2 states).
      required:
        [id, projectId, correlationId, state, attempts, commitSha, error, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        projectId:
          $ref: "#/components/schemas/Uuid"
        correlationId:
          type: string
          description: Correlation id of the accepted command (client-supplied or generated).
        state:
          type: string
          enum:
            - queued
            - preparing
            - committing
            - committed
            - verified
            - conflict
            - failed
        attempts:
          type: integer
          minimum: 0
        commitSha:
          oneOf:
            - type: string
            - type: "null"
        error:
          description: Terminal or most recent failure message, when any.
          oneOf:
            - type: string
            - type: "null"
        createdAt:
          $ref: "#/components/schemas/Timestamp"
        updatedAt:
          $ref: "#/components/schemas/Timestamp"

    TaskBundle:
      type: object
      description: Claim response with full working context (design §15.3). All prose fields are untrusted input; bundles never contain deployment secrets or hidden instructions.
      required: [workItem, lease, document, submissionSchema]
      properties:
        workItem:
          allOf:
            - $ref: "#/components/schemas/WorkItem"
          description: The claimed work item, including acceptance criteria.
        lease:
          allOf:
            - $ref: "#/components/schemas/Lease"
            - type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Opaque lease secret, returned once; only its hash is stored.
        document:
          type: object
          required: [chapterId, revision, contentHash, source]
          properties:
            chapterId:
              $ref: "#/components/schemas/Uuid"
            revision:
              type: integer
              minimum: 1
            contentHash:
              $ref: "#/components/schemas/ContentHash"
            source:
              type: string
              description: Full chapter Markdown at the base revision.
        target:
          type: object
          description: Present for range/block work; resolved against the base revision.
          properties:
            blockId:
              $ref: "#/components/schemas/Uuid"
            exact:
              type: string
            start:
              type: integer
              minimum: 0
            end:
              type: integer
              minimum: 0
        context:
          type: object
          description: Untrusted project data assembled for the claimant.
          properties:
            annotationBody:
              type: string
            chapterSummary:
              type: string
            storyRefs:
              type: array
              items:
                $ref: "#/components/schemas/StoryNodeId"
        submissionSchema:
          type: string
          description: Schema id the submission payload must satisfy.
          examples:
            - authorbot.submission/range-replacement/v1

    StoryGraph:
      type: object
      description: Structural projection of `story/outline.yml` (authorbot.story-graph/v1).
      required: [schema, nodes]
      properties:
        schema:
          type: string
          const: authorbot.story-graph/v1
        nodes:
          type: array
          items:
            type: object
            required: [id, type]
            properties:
              id:
                $ref: "#/components/schemas/StoryNodeId"
              type:
                type: string
                enum: [premise, arc, part, chapter, scene, beat, custom]
              title:
                type: string
              parent:
                $ref: "#/components/schemas/StoryNodeId"
              order:
                type: number
              chapterId:
                $ref: "#/components/schemas/Uuid"
        links:
          type: array
          items:
            type: object
            required: [from, to, kind]
            properties:
              from:
                $ref: "#/components/schemas/StoryNodeId"
              to:
                $ref: "#/components/schemas/StoryNodeId"
              kind:
                type: string

    Timeline:
      type: object
      description: Structural projection of `story/timeline.yml` (authorbot.timeline/v1).
      required: [schema, events]
      properties:
        schema:
          type: string
          const: authorbot.timeline/v1
        events:
          type: array
          items:
            type: object
            required: [id, sortKey, displayTime, title]
            properties:
              id:
                $ref: "#/components/schemas/StoryNodeId"
              sortKey:
                type: number
              displayTime:
                type: string
              title:
                type: string
              participants:
                type: array
                items:
                  $ref: "#/components/schemas/StoryNodeId"
              locations:
                type: array
                items:
                  $ref: "#/components/schemas/StoryNodeId"
              chapterRefs:
                type: array
                items:
                  $ref: "#/components/schemas/Uuid"
              facts:
                type: array
                items:
                  type: string

    Character:
      type: object
      description: Character record projection (authorbot.character/v1).
      required: [id, name]
      properties:
        id:
          $ref: "#/components/schemas/StoryNodeId"
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        summary:
          type: string
        status:
          type: string
        body:
          type: string
          description: Markdown body of the character file. Untrusted content.

    Event:
      type: object
      description: SSE payload shape (design §15.5). Notification only; refetch authoritative resources.
      required: [id, type, occurredAt]
      properties:
        id:
          $ref: "#/components/schemas/Uuid"
        type:
          type: string
          enum:
            - annotation.created
            - annotation.vote_changed
            - work_item.created
            - lease.changed
            - operation.completed
            - publication.completed
        projectId:
          $ref: "#/components/schemas/Uuid"
        occurredAt:
          $ref: "#/components/schemas/Timestamp"
        data:
          type: object
          description: Event-specific reference payload (ids, not full resources).
          additionalProperties: true
