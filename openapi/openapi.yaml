openapi: 3.1.0

info:
  title: Authorbot API
  version: 1.0.0-alpha.0
  summary: Coordination-plane API for Authorbot book projects.
  description: |
    Skeleton of the Authorbot v1 API per design §15.

    Conventions (design §15.1):
    - All paths are prefixed with `/v1`.
    - Entity identifiers are UUIDv7, lowercase.
    - Timestamps are UTC RFC 3339 (`2026-07-19T18:00:00Z`).
    - Mutation endpoints require an `Idempotency-Key` header.
    - Editable resources return `ETag` and honor `If-Match`.
    - Errors are `application/problem+json` (RFC 9457).
    - List endpoints use cursor pagination (`cursor`, `limit`, `nextCursor`).
    - Every response carries `X-Correlation-Id`; asynchronous commands return
      an operation id resolvable at `/v1/projects/{projectId}/operations/{operationId}`.
    - Editorial routes authorize humans and agents through the same exact
      capability vocabulary. Project-control routes require a GitHub-backed
      human session and refuse bearer credentials.

    Implementation status: operations marked `x-implementation-status: planned`
    are design skeleton for later phases and are not served yet. Everything
    else matches the Phase 2 implementation (`apps/api`). Operations marked
    `x-dev-only: true` exist only when the deployment runs `AUTH_MODE=dev`;
    operations marked `x-auth-mode: github` only under `AUTH_MODE=github`.
  license:
    name: UNLICENSED
    identifier: LicenseRef-Authorbot-Internal

servers:
  - url: /
    description: Same-origin deployment; paths already include the /v1 prefix.

security:
  - githubSession: []
  - agentToken: []

tags:
  - name: identity
    description: Identity and project metadata (design §15.2, identity block).
  - name: chapters
    description: Chapters and story documents.
  - name: annotations
    description: Annotations, replies, votes, and re-anchoring.
  - name: work
    description: Work items, leases, and submissions (design §12).
  - name: revisions
    description: Immutable chapter, summary, and repository-document proposals, diffs, and review.
  - name: operations
    description: Git operations, event stream, and webhooks.
  - name: access
    description: >-
      Author-facing access control (Phase 7): who may write, the emergency
      stops, the moderation queue, revocation, and the readable audit view.

paths:
  /v1/me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Return the authenticated actor, memberships, and effective capabilities.
      responses:
        "200":
          description: The current actor.
          headers:
            X-Correlation-Id:
              $ref: "#/components/headers/XCorrelationId"
          content:
            application/json:
              schema:
                type: object
                required:
                  - actor
                  - memberships
                  - scopes
                  - authKind
                  - capabilityMode
                  - grantedCapabilities
                  - roleCapabilityCeiling
                  - effectiveCapabilities
                  - legacyEffectiveActions
                properties:
                  actor:
                    $ref: "#/components/schemas/Actor"
                  memberships:
                    type: array
                    items:
                      $ref: "#/components/schemas/Membership"
                  scopes:
                    type: array
                    description: Effective scopes (role bundle for sessions, token ∩ bundle for agents).
                    items:
                      $ref: "#/components/schemas/Scope"
                  authKind:
                    type: string
                    enum: [session, token]
                  capabilityMode:
                    $ref: "#/components/schemas/CapabilityMode"
                  grantedCapabilities:
                    $ref: "#/components/schemas/EditorialCapabilitySet"
                  roleCapabilityCeiling:
                    $ref: "#/components/schemas/EditorialCapabilitySet"
                  effectiveCapabilities:
                    $ref: "#/components/schemas/EditorialCapabilitySet"
                  legacyEffectiveActions:
                    type: array
                    items:
                      $ref: "#/components/schemas/LegacyEffectiveAction"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/dev/login:
    post:
      operationId: devLogin
      tags: [identity]
      summary: Create or load a dev actor + membership and issue a session cookie.
      description: |
        Mounted ONLY when the deployment runs `AUTH_MODE=dev`; the route does
        not exist under `AUTH_MODE=github`. Creates/loads the actor
        (`github:<login>`), replaces its membership with the requested role,
        and sets the `authorbot_session` cookie.
      x-dev-only: true
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, role]
              properties:
                login:
                  type: string
                  pattern: "^[A-Za-z0-9][A-Za-z0-9-]{0,38}$"
                role:
                  type: string
                  enum: [reader, contributor, editor, maintainer]
      responses:
        "200":
          description: Session issued; `Set-Cookie` carries the signed session.
          headers:
            Set-Cookie:
              description: "`authorbot_session=<id>.<hmac>; HttpOnly; Secure; SameSite=Lax`"
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [actor, membership, scopes]
                properties:
                  actor:
                    $ref: "#/components/schemas/Actor"
                  membership:
                    $ref: "#/components/schemas/Membership"
                  scopes:
                    type: array
                    items:
                      $ref: "#/components/schemas/Scope"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/health:
    get:
      operationId: health
      tags: [identity]
      summary: Whether this deployment can do the work it was set up to do.
      description: >-
        Unauthenticated, because the caller that most needs it has no
        credential: the setup wizard checks the API before switching a book's
        collaboration controls on, and does so anonymously. `gitIntegration`
        says whether the GitHub App is usable - never what it is. A status word
        and nothing else, which is why it can be public.
      security: []
      responses:
        "200":
          description: Deployment status.
          content:
            application/json:
              schema:
                type: object
                required: [status, gitIntegration]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  gitIntegration:
                    type: string
                    enum: [configured, incomplete, unconfigured]

  /v1/auth/logout:
    post:
      operationId: signOut
      tags: [identity]
      summary: End the current session.
      description: >-
        Revokes the session server-side and clears its cookie. Always 204,
        whether or not a live session was found, so a caller learns nothing
        about whether their cookie was real. Registered in every auth mode:
        before this existed there were two routes to create a session and none
        to end one.
      security: []
      responses:
        "204":
          description: Signed out; the session cookie is cleared.

  /v1/auth/github:
    get:
      operationId: startGithubLogin
      tags: [identity]
      summary: Begin the GitHub OAuth web flow (github mode only).
      x-auth-mode: github
      security: []
      responses:
        "302":
          description: Redirect to GitHub's authorize URL; sets a signed state cookie.

  /v1/auth/github/callback:
    get:
      operationId: finishGithubLogin
      tags: [identity]
      summary: Complete the GitHub OAuth web flow and issue a session (github mode only).
      x-auth-mode: github
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Session issued via `Set-Cookie`; redirects to `/`.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/projects/{projectId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getProject
      tags: [identity]
      summary: Return project metadata.
      responses:
        "200":
          description: The project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/members:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listProjectMembers
      tags: [identity]
      summary: List project members.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of memberships.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/Membership"
                        - type: object
                          required: [actor]
                          properties:
                            actor:
                              description: The member's actor, or null when the row is dangling.
                              oneOf:
                                - $ref: "#/components/schemas/Actor"
                                - type: "null"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/agent-tokens:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listAgentTokens
      tags: [access]
      summary: Agent token metadata and effective capabilities - never the token value.
      description: >-
        Name, canonical grant and role ceiling, effective capabilities, legacy
        compatibility state, owning human, membership role, and created /
        last-used / expiry times. Tokens are never re-displayable: no code path
        in the system can return a token value after the mint response that
        created it.
      parameters:
        - name: includeRevoked
          in: query
          required: false
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Token metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/AgentToken"
                        - type: object
                          properties:
                            owner: { $ref: "#/components/schemas/Actor" }
                            role: { $ref: "#/components/schemas/Role" }
                            expired: { type: boolean }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createAgentToken
      tags: [identity]
      summary: Mint a named, capability-limited, expiring agent token (returned once).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  additionalProperties: false
                  required: [name, capabilities]
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 100
                    capabilities:
                      $ref: "#/components/schemas/EditorialCapabilitySet"
                    expiresInDays:
                      type: integer
                      minimum: 1
                      maximum: 90
                      default: 30
                - type: object
                  deprecated: true
                  description: Deprecated legacy scope request retained during the Phase 11 transition.
                  additionalProperties: false
                  required: [name, scopes]
                  properties:
                    name:
                      type: string
                      minLength: 1
                      maxLength: 100
                    scopes:
                      type: array
                      minItems: 1
                      uniqueItems: true
                      items:
                        $ref: "#/components/schemas/Scope"
                    expiresInDays:
                      type: integer
                      minimum: 1
                      maximum: 90
                      default: 30
      responses:
        "201":
          description: Token created; the secret appears exactly once, here.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AgentToken"
                  - type: object
                    required: [token]
                    properties:
                      token:
                        type: string
                        description: >-
                          Opaque bearer secret (`authorbot_<43 chars base64url>`);
                          only its SHA-256 hash is stored. Idempotent replays
                          return `tokenRedacted: true` instead.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/agent-tokens/{tokenId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: tokenId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    delete:
      operationId: revokeAgentToken
      tags: [identity]
      summary: Revoke an agent token.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204":
          description: Token revoked (no body).
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/agent-tokens/{tokenId}/capabilities:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - name: tokenId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/Uuid"
    put:
      operationId: replaceAgentTokenCapabilities
      tags: [identity]
      summary: Replace an active agent token's complete canonical capability set.
      description: >-
        Human-session maintainer control. The replacement is atomic and does
        not rotate or return the bearer secret. Sending the same complete set
        with the same idempotency key is safe to retry.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [capabilities]
              properties:
                capabilities:
                  $ref: "#/components/schemas/EditorialCapabilitySet"
      responses:
        "200":
          description: Updated metadata and effective capability projection.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AgentToken"
                  - type: object
                    required: [role]
                    properties:
                      role:
                        oneOf:
                          - $ref: "#/components/schemas/Role"
                          - type: "null"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/repository-documents/source:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getRepositoryDocumentSource
      tags: [revisions]
      summary: Read one configured planning document as an editable source snapshot.
      description: >-
        Requires project membership and `revisions:write`. `kind` and `path`
        must identify the project's configured outline, timeline, or one file
        matched by its character-document glob. The returned content hash is
        the optimistic-concurrency base for a `repository_document` proposal.
      parameters:
        - name: kind
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/RepositoryDocumentKind"
        - name: path
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 1024
          description: Safe repository-relative path configured for this document kind.
      responses:
        "200":
          description: Validated editable source at the branch head.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryDocumentSource"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/revision-proposals:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listRevisionProposals
      tags: [revisions]
      summary: List revision proposal metadata without prose snapshots.
      description: Requires the exact `revisions:read` capability and project membership.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RevisionProposalStatus"
        - name: chapterId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Uuid"
      responses:
        "200":
          description: Cursor page of proposal metadata.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/RevisionProposal"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createRevisionProposal
      tags: [revisions]
      summary: Propose a chapter, summary, or configured planning-document replacement.
      description: >-
        Chapter replacements and repository documents require
        `revisions:write`. Chapter-summary proposals instead require
        `chapters:read` plus `summaries:write` and are available at the
        contributor role floor. Repository-document proposals address only
        the configured outline, timeline, or character paths and use a content
        hash rather than a chapter revision as their concurrency base.
        `applyImmediately` additionally requires maintainer role plus
        `revisions:review` and still creates the immutable reviewed proposal,
        self-review audit, and linked Git write atomically. Legacy scopes never
        translate to these capabilities.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRevisionProposal"
      responses:
        "201":
          description: Proposal is pending review; no Git write was enqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionProposalCommandResult"
        "202":
          description: Audited apply-immediately proposal is applying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionProposalCommandResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/revision-proposals/{proposalId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ProposalId"
    get:
      operationId: getRevisionProposal
      tags: [revisions]
      summary: Read one proposal including its immutable before/after snapshots.
      responses:
        "200":
          description: Authorized proposal detail and current-base conflict warning.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/RevisionProposal"
                  - type: object
                    required: [baseContent, proposedContent]
                    properties:
                      baseContent: { type: string }
                      proposedContent: { type: string }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/revision-proposals/{proposalId}/diff:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ProposalId"
    get:
      operationId: getRevisionProposalDiff
      tags: [revisions]
      summary: Read a bounded standard unified diff plus accessible snapshots.
      description: Requires `revisions:read`; hostile proposal text is returned only as JSON data.
      responses:
        "200":
          description: Diff and plain before/after fallback.
          content:
            application/json:
              schema:
                type: object
                required:
                  [proposalId, proposal, target, author, baseContent, proposedContent, unifiedDiff, computationLimited]
                properties:
                  proposalId:
                    $ref: "#/components/schemas/Uuid"
                  proposal:
                    $ref: "#/components/schemas/RevisionProposal"
                  target:
                    $ref: "#/components/schemas/RevisionProposalTarget"
                  author:
                    oneOf:
                      - $ref: "#/components/schemas/RevisionProposalActor"
                      - type: "null"
                  baseContent: { type: string }
                  proposedContent: { type: string }
                  unifiedDiff:
                    oneOf: [{ type: string }, { type: "null" }]
                  computationLimited: { type: boolean }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/revision-proposals/{proposalId}/approve:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: approveRevisionProposal
      tags: [revisions]
      summary: Review and enqueue one pending proposal atomically.
      description: >-
        Requires `revisions:review`. Work proposals move proposal, submission,
        and work item to applying in the same CAS-protected batch; direct and
        summary proposals enqueue a linked `chapter.write` operation.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisionReview"
      responses:
        "202":
          description: Proposal is applying.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionProposalCommandResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/revision-proposals/{proposalId}/reject:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ProposalId"
    post:
      operationId: rejectRevisionProposal
      tags: [revisions]
      summary: Reject one pending proposal atomically.
      description: >-
        Requires `revisions:review`. A linked work submission becomes rejected
        and its work item returns to ready in the same CAS-protected batch.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevisionReview"
      responses:
        "200":
          description: Proposal rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevisionProposalCommandResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listChapters
      tags: [chapters]
      summary: List chapter projections.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of chapters.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ChapterSummary"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/chapters/{chapterId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: getChapter
      tags: [chapters]
      summary: Return one chapter projection.
      responses:
        "200":
          description: The chapter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chapter"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/projects/{projectId}/chapters/{chapterId}/history:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: listChapterHistory
      tags: [chapters]
      summary: List bounded chapter revision metadata, newest first.
      description: >-
        Requires project membership and the exact `history:read` capability.
        Listing reads repository commit metadata but not historical chapter
        bodies. At most 50 revisions are returned per request, even when a
        larger general API limit is supplied.
      parameters:
        - name: cursor
          in: query
          required: false
          description: One-based history page number returned as `nextCursor`.
          schema:
            type: integer
            minimum: 1
            default: 1
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Bounded revision metadata plus the current chapter identity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterHistoryPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters/{chapterId}/history/{revision}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
      - name: revision
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    get:
      operationId: getChapterHistoryRevision
      tags: [chapters]
      summary: Read one historical chapter snapshot and a bounded comparison.
      description: >-
        Requires `history:read`. `previous` compares the selected snapshot with
        its predecessor; `current` compares it with the current revision. The
        original revision, and a current-to-current comparison, have no second
        snapshot or synthetic diff.
      parameters:
        - name: compare
          in: query
          required: false
          schema:
            type: string
            enum: [previous, current]
            default: previous
      responses:
        "200":
          description: Selected snapshot, optional comparison, and oriented unified diff.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterHistoryDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters/{chapterId}/history/{revision}/restore:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
      - name: revision
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    post:
      operationId: restoreChapterHistoryRevision
      tags: [chapters, revisions]
      summary: Propose restoring an older chapter snapshot.
      description: >-
        Requires both `history:read` and `revisions:write`. This never rewinds Git or applies text
        immediately: it creates an immutable `chapter_replacement` proposal
        with origin `history_restore` against the current chapter revision.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: Restore proposal created and pending maintainer review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChapterHistoryRestoreResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/chapter-submissions:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    post:
      operationId: createChapterSubmission
      tags: [chapters]
      summary: Write a chapter directly, or revise one, without a work item.
      description: >-
        The direct authoring path (Phase 6 contract 3.5). The author sends a
        title and Markdown prose; the server generates the chapter id, the
        block marker for every top-level block, the slug, the order (last
        existing + 10), `status: draft`, and the revision. Requires the
        canonical `chapters:write` capability, or the legacy
        `submissions:write` scope, AND the editor or maintainer role. Publishing
        is a separate action.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/NewChapterSubmission"
                - $ref: "#/components/schemas/ChapterRevisionSubmission"
      responses:
        "202":
          description: Accepted and queued for Git integration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedChapterWrite"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/chapters/{chapterId}/source:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: getChapterSource
      tags: [chapters]
      summary: Return a chapter's prose for the composer.
      description: >
        The chapter's Markdown as an author wrote it: frontmatter removed and
        block markers stripped. Feeds the Phase 6 §3.5 composer, whose revise
        half requires a complete replacement body plus the current
        `baseRevision` and `baseContentHash` - send `revision` and `contentHash`
        straight back as those values. Canonical credentials require
        `chapters:read`; legacy credentials use the historical
        `submissions:write` scope. This read is not limited to editors and
        maintainers.
      responses:
        "200":
          description: The chapter's editable source.
          content:
            application/json:
              schema:
                type: object
                required: [chapterId, title, revision, contentHash, status, body]
                properties:
                  chapterId:
                    type: string
                    format: uuid
                  title:
                    type: string
                  summary:
                    type: string
                    nullable: true
                  revision:
                    type: integer
                    description: Send back as `baseRevision` when revising.
                  contentHash:
                    allOf:
                      - $ref: "#/components/schemas/ContentHash"
                    description: >
                      Digest of the exact repository source read for this
                      response. Send back as `baseContentHash` when proposing
                      a chapter revision.
                  status:
                    type: string
                    enum: [draft, proposed, published]
                  body:
                    type: string
                    description: Markdown with no frontmatter and no block markers.
                  correlationId:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters/{chapterId}/publish:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    post:
      operationId: publishChapter
      tags: [chapters]
      summary: Publish a draft chapter (maintainer only).
      description: >-
        Deliberately distinct from writing (Phase 6 contract 3.5): saving prose
        never publishes it. Moves the chapter's frontmatter `status` from
        `draft` to `published`, stamps `published_at`, and bumps the revision,
        as one attributed commit.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Accepted and queued for Git integration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedChapterWrite"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters/{chapterId}/unpublish:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    post:
      operationId: unpublishChapter
      tags: [chapters]
      summary: Return a published chapter to draft (maintainer only).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Accepted and queued for Git integration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedChapterWrite"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/story/outline:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getStoryOutline
      tags: [chapters]
      summary: Read the configured, validated story outline.
      description: >-
        Requires the exact `chapters:read` capability. The path comes only
        from the projected book.yml planning configuration (or its canonical
        default); callers cannot supply an arbitrary repository path.
      responses:
        "200":
          description: Validated outline at the repository branch head.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryOutlineResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/story/timeline:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: getStoryTimeline
      tags: [chapters]
      summary: Read the configured, validated story timeline.
      description: Requires the exact `chapters:read` capability.
      responses:
        "200":
          description: Validated timeline at the repository branch head.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryTimelineResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/story/characters:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
    get:
      operationId: listStoryCharacters
      tags: [chapters]
      summary: Page through configured, validated character documents.
      description: >-
        Requires the exact `chapters:read` capability. Each page reads at most
        20 configured character blobs through the per-project coordinator;
        it never fans out over every file in one Worker invocation.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 20
      responses:
        "200":
          description: Bounded page of validated character records and Markdown bodies.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoryCharacterPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/chapters/{chapterId}/annotations:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/ChapterId"
    get:
      operationId: listAnnotations
      tags: [annotations]
      summary: List annotations on a chapter.
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of annotations.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Annotation"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createAnnotation
      tags: [annotations]
      summary: Create a comment or suggestion on a chapter (queued for Git mirroring).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [kind, scope, chapterRevision, body]
              description: |
                `target` is required for `range` scope (blockId + textPosition +
                textQuote) and `block` scope (blockId only), and forbidden for
                `chapter` scope. `chapterRevision` must equal the projected
                revision (else 409). Body is Markdown ≤ 32 KiB passing the
                Phase 0 safety rules (no raw HTML, allowed URL schemes only).
              properties:
                kind:
                  $ref: "#/components/schemas/AnnotationKind"
                scope:
                  $ref: "#/components/schemas/AnnotationScope"
                chapterRevision:
                  type: integer
                  minimum: 1
                target:
                  $ref: "#/components/schemas/AnnotationTarget"
                body:
                  type: string
                  description: Markdown body. Untrusted content; sanitized on render.
      responses:
        "202":
          description: Accepted; the record is `pending_git` until its operation commits.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [annotationId]
                    properties:
                      annotationId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/annotations/{annotationId}:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    get:
      operationId: getAnnotation
      tags: [annotations]
      summary: Return one annotation with its collaboration state.
      description: >
        The single-annotation read complement of `listAnnotations`, returning
        the same `Annotation` shape (including the caller's own vote, when
        authenticated). Follows the same anonymous-read gate as the chapter
        annotations list: readable without a session only when the project
        publishes annotations publicly.
      responses:
        "200":
          description: The annotation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Annotation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/annotations/{annotationId}/replies:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    get:
      operationId: listAnnotationReplies
      tags: [annotations]
      summary: List an annotation's replies (threaded via parentReplyId).
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: A page of replies.
          content:
            application/json:
              schema:
                type: object
                required: [items, nextCursor]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reply"
                  nextCursor:
                    $ref: "#/components/schemas/NextCursor"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      operationId: createAnnotationReply
      tags: [annotations]
      summary: Reply to an annotation (queued for Git mirroring).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [body]
              properties:
                body:
                  type: string
                  description: Markdown body ≤ 32 KiB, same safety rules as annotations.
                parentReplyId:
                  $ref: "#/components/schemas/Uuid"
      responses:
        "202":
          description: Accepted; the reply is `pending_git` until its operation commits.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [replyId]
                    properties:
                      replyId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /v1/projects/{projectId}/annotations/{annotationId}/vote:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    put:
      operationId: putAnnotationVote
      tags: [annotations]
      summary: Create or replace the caller's current vote (one per actor).
      description: |
        Requires `votes:write` (the contributor role bundle and above; agents
        vote only when their membership grants it). Votes are accepted on
        suggestions only - a comment returns 422. Recording the vote runs the
        declarative rule engine in the same serialized command: a threshold
        crossing creates a sticky decision and a `ready` work item, both
        surfaced in `decision`. Tallies are aggregate-only; per-voter identity
        is never returned (design §26.1).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  $ref: "#/components/schemas/VoteValue"
      responses:
        "200":
          description: Vote recorded; returns the refreshed aggregate and any decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      operationId: deleteAnnotationVote
      tags: [annotations]
      summary: Clear the caller's current vote.
      description: |
        Removes the caller's current vote (idempotent - clearing a non-existent
        vote still returns 200) and re-evaluates the rule. Dropping below a
        satisfied rule marks the existing decision `support_changed`; the
        decision and its work item are never deleted (design §11.3).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Vote cleared; returns the refreshed aggregate and any decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/projects/{projectId}/annotations/{annotationId}/reject:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: rejectSuggestion
      tags: [annotations]
      summary: Maintainer override - reject an open suggestion.
      description: |
        Maintainer-only. Transitions an `open` suggestion to `rejected` and
        records a sticky override decision (`rule_version: 0`) carrying the
        required `reason` as `override_reason`. Audited. A non-open suggestion
        returns 409.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/OverrideReason"
      responses:
        "200":
          description: Suggestion rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnotationOverrideResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/annotations/{annotationId}/reopen:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: reopenSuggestion
      tags: [annotations]
      summary: Maintainer override - reopen a rejected suggestion.
      description: |
        Maintainer-only. Transitions a `rejected` suggestion back to `open` and
        records an override decision (`rule_version: 0`) with the required
        `reason`. Audited.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/OverrideReason"
      responses:
        "200":
          description: Suggestion reopened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnotationOverrideResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/annotations/{annotationId}/force-create-work-item:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: forceCreateWorkItem
      tags: [annotations]
      summary: Promote an annotation to a work item, bypassing the rule.
      description: |
        Maintainer-only. Creates a `ready` work item for an open comment or
        suggestion without a satisfied rule, recorded as an override decision
        on the same uniqueness key `(sourceAnnotationId, create_work_item,
        rule_version 0)` - a second call returns 409. The annotation transitions
        to `work_item_created`. No rationale is required; legacy callers may
        still supply one.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        $ref: "#/components/requestBodies/PromotionBody"
      responses:
        "201":
          description: Work item force-created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AnnotationOverrideResult"
                  - type: object
                    required: [workItemId]
                    properties:
                      workItemId:
                        $ref: "#/components/schemas/Uuid"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /v1/projects/{projectId}/annotations/{annotationId}/withdraw:
    parameters:
      - $ref: "#/components/parameters/ProjectId"
      - $ref: "#/components/parameters/AnnotationId"
    post:
      operationId: withdrawAnnotation
      tags: [annotations]
      summary: Withdraw an annotation (author or maintainer; queued for Git mirroring).
      description: |
        Queues a Git operation that rewrites the artifact's frontmatter
        `status`; the record flips to `withdrawn` only after that operation
        commits (until then it still reads `open`, and a failed operation
        leaves it `open` and retryable). Annotations still in `pending_git`
        cannot be withdrawn (409 `state-conflict`).
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: false
      responses:
        "202":
          description: Accepted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/AcceptedCommand"
                  - type: object
                    required: [annotationId]
                    properties:
                      annotationId:
                        $ref: "#/components/schemas/Uuid"
